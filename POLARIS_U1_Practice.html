<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>POLARIS U1 — Me & My Family</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f5f2;min-height:100vh;color:#1a2e22}
:root{--g:#1a7a4a;--g2:#25a068;--g3:#e8f5ee;--red:#c83040;--blue:#1860a0;--gray:#6b7c74;--shadow:0 2px 12px rgba(0,0,0,.1)}

/* HEADER */
#hdr{background:var(--g);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:16px}
.logo{font-size:20px;font-weight:800;letter-spacing:2px}
.unit-sub{font-size:13px;opacity:.8}

/* MODULE TABS */
#modTabs{display:flex;background:#145e38;overflow-x:auto;scrollbar-width:none}
#modTabs::-webkit-scrollbar{display:none}
.mtab{padding:10px 14px;color:rgba(255,255,255,.65);cursor:pointer;font-weight:700;font-size:12px;border-bottom:3px solid transparent;white-space:nowrap;transition:.2s;text-align:center;min-width:60px}
.mtab:hover{color:#fff;background:rgba(255,255,255,.1)}
.mtab.active{color:#fff;border-bottom-color:#7de8a8;background:rgba(255,255,255,.15)}
.mtab-key{font-size:18px;display:block}
.mtab-name{font-size:9px;opacity:.85}

/* CONTENT */
#app{max-width:860px;margin:0 auto;padding:20px 14px}

/* MODULE HEADER */
.mod-hdr{background:#fff;border-radius:10px;padding:16px 20px;margin-bottom:16px;border-left:5px solid var(--g);box-shadow:var(--shadow)}
.mod-hdr h2{font-size:18px;color:var(--g);margin-bottom:2px}
.mod-hdr p{color:var(--gray);font-size:13px}

/* TOPIC & MODE TABS */
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.chip{padding:5px 13px;border-radius:16px;border:1.5px solid #c0dcd0;color:var(--g);cursor:pointer;font-size:12px;font-weight:600;background:#fff;transition:.2s}
.chip.active,.chip:hover{background:var(--g3);border-color:var(--g)}
.mode-chip{padding:7px 18px;border-radius:20px;border:2px solid var(--g);color:var(--g);cursor:pointer;font-weight:700;font-size:13px;background:#fff;transition:.2s}
.mode-chip.active{background:var(--g);color:#fff}

/* FLASHCARD */
.fc-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.fc-counter{color:var(--gray);font-size:13px;font-weight:600}
.prog{width:100%;max-width:460px;background:#ddd;border-radius:4px;height:5px}
.prog-fill{background:var(--g);height:100%;border-radius:4px;transition:width .3s}
.scene{width:100%;max-width:460px;height:240px;perspective:1000px;cursor:pointer;user-select:none}
.card3d{width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s;position:relative}
.card3d.flipped{transform:rotateY(180deg)}
.face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;box-shadow:0 4px 18px rgba(0,0,0,.12)}
.front{background:#fff;border:2px solid #cce8d8}
.back{background:var(--g);color:#fff;transform:rotateY(180deg)}
.fc-word{font-size:26px;font-weight:800;text-align:center;margin-bottom:6px;line-height:1.2}
.fc-syl{font-size:13px;letter-spacing:.5px;margin-bottom:4px}
.fc-hint{font-size:11px;color:#bbb;margin-top:8px}
.back .fc-hint{color:rgba(255,255,255,.5)}
.fc-vi{font-size:17px;font-weight:700;text-align:center;margin-bottom:10px}
.fc-ex{font-size:12px;font-style:italic;text-align:center;opacity:.85;line-height:1.5}
.stress{color:var(--red);font-weight:800}
.back .stress{color:#7de8a8}
.syl-dot{color:#bbb;font-size:10px;margin:0 1px}
.back .syl-dot{color:rgba(255,255,255,.4)}
.chunk-sep{color:#7de8a8;margin:0 5px;font-weight:800}
.front .chunk-sep{color:var(--blue)}

/* CONTROLS */
.fc-ctrl{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.btn{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;transition:.2s}
.btn-g{background:var(--g);color:#fff}.btn-g:hover{background:var(--g2)}
.btn-out{background:#fff;color:var(--g);border:2px solid var(--g)}.btn-out:hover{background:var(--g3)}
.btn-aud{background:#e8f0fe;color:var(--blue);border:1.5px solid #b0caf0;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
.btn-aud:hover{background:#d0e0fd}
.btn:disabled{opacity:.4;cursor:default}

/* LIST VIEW */
.wlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.wcard{background:#fff;border-radius:9px;padding:12px 14px;box-shadow:0 1px 5px rgba(0,0,0,.07);border-left:4px solid var(--g)}
.wcard-en{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:2px}
.wcard-syl{font-size:11px;color:var(--gray);margin-bottom:3px}
.wcard-vi{font-size:13px;color:var(--blue);font-weight:600;margin-bottom:3px}
.wcard-ex{font-size:11px;color:var(--gray);font-style:italic}
.aud-sm{background:none;border:none;cursor:pointer;font-size:15px;padding:2px;line-height:1}

/* QUIZ */
.quiz-wrap{max-width:580px;margin:0 auto}
.qcard{background:#fff;border-radius:12px;padding:22px;margin-bottom:14px;box-shadow:var(--shadow)}
.q-label{font-size:11px;color:var(--gray);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.q-word{font-size:24px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.q-syl{font-size:13px;color:var(--gray);margin-bottom:6px}
.q-type-toggle{display:flex;gap:8px;margin-bottom:14px}
.qt-btn{padding:4px 12px;border-radius:12px;border:1.5px solid #c0dcd0;background:#fff;color:var(--g);font-size:11px;font-weight:700;cursor:pointer}
.qt-btn.active{background:var(--g3);border-color:var(--g)}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
.opt{padding:11px 14px;border-radius:8px;border:2px solid #d0e8da;background:#fff;cursor:pointer;font-size:13px;font-weight:500;text-align:left;transition:.15s;line-height:1.4}
.opt:hover:not(.done){border-color:var(--g);background:var(--g3)}
.opt.ok{background:#e8f7ef;border-color:var(--g);color:var(--g);font-weight:700}
.opt.bad{background:#fde8ea;border-color:var(--red);color:var(--red)}
.opt.done{cursor:default}
.result-box{background:#fff;border-radius:12px;padding:30px;text-align:center;box-shadow:var(--shadow)}
.score-big{font-size:52px;font-weight:800;color:var(--g)}
.score-msg{font-size:15px;color:var(--gray);margin-bottom:20px}

/* START SCREEN */
.start-box{background:#fff;border-radius:12px;padding:30px;text-align:center;box-shadow:var(--shadow);max-width:480px;margin:0 auto}

/* RESPONSIVE */
@media(max-width:560px){
  .opts{grid-template-columns:1fr}
  .wlist{grid-template-columns:1fr}
  .scene{height:210px}
  .fc-word{font-size:21px}
}
</style>
</head>

// ─── STATE ───────────────────────────────────────────────────────────────────
let mod = 'A', topic = null, mode = 'study';
let ci = 0, flipped = false, listView = false;
let quizReverse = false;
let Q = { qs:[], cur:0, score:0, answered:false, chosen:null };

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function renderSyl(s) {
  // Highlight stressed syllables (all-caps sequences ≥2 or single cap between dots)
  let r = s.replace(/[A-Z]{2,}/g, m => `<span class="stress">${m}</span>`);
  r = r.replace(/·([A-Z])(?=·|$)/g, (_,c) => `·<span class="stress">${c}</span>`);
  r = r.replace(/^([A-Z])(?=·)/g, (_,c) => `<span class="stress">${c}</span>`);
  r = r.replace(/·/g, '<span class="syl-dot">·</span>');
  return r;
}

function getWords() {
  const tops = MODS[mod].topics;
  if (!topic || topic === '__ALL__') return Object.values(tops).flat();
  return tops[topic] || Object.values(tops)[0];
}

function allWords() { return Object.values(MODS[mod].topics).flat(); }

function speak(txt) {
  speechSynthesis.cancel();
  const clean = txt.replace(/·/g,'');
  const u = new SpeechSynthesisUtterance(clean);
  u.rate = 0.82; u.lang = 'en-GB';
  speechSynthesis.speak(u);
}

function sp(e, txt) { e.stopPropagation(); speak(txt); }

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const m = MODS[mod];
  const tnames = Object.keys(m.topics);
  if (!topic) topic = tnames[0];

  const topicChips = tnames.map(t =>
    `<button class="chip${topic===t?' active':''}" onclick="setTopic('${t}')">${t}</button>`
  ).join('');
  const allChip = tnames.length > 1
    ? `<button class="chip${topic==='__ALL__'?' active':''}" onclick="setTopic('__ALL__')">All Topics</button>`
    : '';

  document.getElementById('app').innerHTML = `
    <div class="mod-hdr">
      <h2>${mod}. ${m.name}</h2>
      <p>${m.sub}</p>
    </div>
    <div class="row">${topicChips}${allChip}</div>
    <div class="row">
      <button class="mode-chip${mode==='study'?' active':''}" onclick="setMode('study')">📚 Study</button>
      <button class="mode-chip${mode==='quiz'?' active':''}" onclick="setMode('quiz')">🎯 Quiz</button>
    </div>
    <div id="mc">${mode==='study'?renderStudy():renderQuiz()}</div>
  `;
}

// ── STUDY ────────────────────────────────────────────────────────────────────
function renderStudy() {
  const words = getWords();
  const w = words[ci] || words[0];
  return `
    <div class="row">
      <button class="chip${!listView?' active':''}" onclick="setListView(false)">🃏 Flashcard</button>
      <button class="chip${listView?' active':''}" onclick="setListView(true)">📋 List</button>
      <button class="chip" onclick="shuffle()">🔀 Shuffle</button>
    </div>
    ${listView ? renderList(words) : renderCard(w, words.length)}
  `;
}

function renderCard(w, total) {
  const [en, syl, vi, ex] = w;
  const exParts = ex.split(', ');
  const exHtml = exParts.map((p,i) =>
    i<exParts.length-1 ? p+'<span class="chunk-sep">/</span>' : p
  ).join('');

  return `
    <div class="fc-wrap">
      <div class="fc-counter">${ci+1} / ${total}</div>
      <div class="prog"><div class="prog-fill" style="width:${((ci+1)/total*100).toFixed(1)}%"></div></div>
      <div class="scene" onclick="flip()">
        <div class="card3d${flipped?' flipped':''}">
          <div class="face front">
            <div class="fc-word">${en}</div>
            <div class="fc-syl">${renderSyl(syl)}</div>
            <div class="fc-hint">tap to reveal ↓</div>
          </div>
          <div class="face back">
            <div class="fc-vi">${vi}</div>
            <div style="width:70%;height:1px;background:rgba(255,255,255,.25);margin:8px 0"></div>
            <div class="fc-ex">${exHtml}</div>
            ${flipped?`<div class="fc-hint" style="margin-top:10px">
              <button class="btn-aud" onclick="sp(event,'${ex.replace(/'/g,"\\'")}')">🔊 example</button>
            </div>`:''}
          </div>
        </div>
      </div>
      <div class="fc-ctrl">
        <button class="btn btn-out" onclick="prevCard()" ${ci===0?'disabled':''}>← Prev</button>
        <button class="btn-aud" onclick="sp(event,'${en.replace(/'/g,"\\'")}')">🔊 Listen</button>
        <button class="btn btn-g" onclick="nextCard()" ${ci>=total-1?'disabled':''}>Next →</button>
      </div>
    </div>
  `;
}

function renderList(words) {
  return `<div class="wlist">${words.map(([en,syl,vi,ex]) => `
    <div class="wcard">
      <div class="wcard-en">${en}
        <button class="aud-sm" onclick="sp(event,'${en.replace(/'/g,"\\'")}')">🔊</button>
      </div>
      <div class="wcard-syl">${renderSyl(syl)}</div>
      <div class="wcard-vi">${vi}</div>
      <div class="wcard-ex">${ex}</div>
    </div>
  `).join('')}</div>`;
}

// ── QUIZ ─────────────────────────────────────────────────────────────────────
function renderQuiz() {
  if (!Q.qs.length) return renderQuizStart();
  if (Q.cur >= Q.qs.length) return renderQuizResult();
  return renderQuizQ();
}

function renderQuizStart() {
  const n = allWords().length;
  return `
    <div class="start-box">
      <div style="font-size:46px;margin-bottom:14px">🎯</div>
      <h3 style="font-size:19px;margin-bottom:6px">Quiz — ${MODS[mod].name}</h3>
      <p style="color:#6b7c74;font-size:14px;margin-bottom:18px">${n} words available · 10 questions</p>
      <div class="q-type-toggle" style="justify-content:center;margin-bottom:20px">
        <button class="qt-btn${!quizReverse?' active':''}" onclick="setQType(false)">EN → 🇻🇳</button>
        <button class="qt-btn${quizReverse?' active':''}" onclick="setQType(true)">🇻🇳 → EN</button>
      </div>
      <button class="btn btn-g" style="padding:12px 32px;font-size:15px" onclick="startQuiz()">Start Quiz</button>
    </div>
  `;
}

function renderQuizQ() {
  const q = Q.qs[Q.cur];
  const [en, syl, vi] = q.word;
  const qWord = quizReverse ? vi : en;
  const qSyl  = quizReverse ? '' : renderSyl(syl);

  return `
    <div class="quiz-wrap">
      <div class="prog" style="margin-bottom:14px">
        <div class="prog-fill" style="width:${(Q.cur/Q.qs.length*100).toFixed(1)}%"></div>
      </div>
      <div style="font-size:12px;color:#6b7c74;margin-bottom:10px;font-weight:700">
        Q ${Q.cur+1} / ${Q.qs.length} &nbsp;·&nbsp; Score: ${Q.score}
      </div>
      <div class="qcard">
        <div class="q-label">${quizReverse?'What is the English word?':'What does this mean in Vietnamese?'}</div>
        <div class="q-word">
          ${qWord}
          ${!quizReverse?`<button class="btn-aud" onclick="sp(event,'${en.replace(/'/g,"\\'")}')">🔊</button>`:''}
        </div>
        ${qSyl?`<div class="q-syl">${qSyl}</div>`:''}
        <div class="opts">
          ${q.options.map((opt,i)=>`
            <button class="opt${Q.answered?(opt===q.correct?' ok':(opt===Q.chosen?' bad':''))+' done':''}"
              onclick="answer(${i})">${opt}</button>
          `).join('')}
        </div>
      </div>
      ${Q.answered?`
        <div style="text-align:center;padding:10px 0">
          ${Q.chosen===q.correct
            ?'<div style="color:var(--g);font-weight:800;font-size:16px">✅ Correct!</div>'
            :`<div style="color:var(--red);font-weight:800;font-size:16px">❌ Answer: ${q.correct}</div>`}
          <div style="color:#6b7c74;font-size:12px;font-style:italic;margin:6px 0">"${q.word[3]}"</div>
          <button class="btn btn-g" onclick="nextQ()" style="margin-top:10px">
            ${Q.cur+1<Q.qs.length?'Next →':'See Results'}
          </button>
        </div>
      `:''}
    </div>
  `;
}

function renderQuizResult() {
  const pct = Math.round(Q.score/Q.qs.length*100);
  const em = pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':'💪';
  const msg = pct>=90?'Outstanding!':pct>=70?'Great work!':pct>=50?'Good effort — keep going!':'Review and try again!';
  return `
    <div class="quiz-wrap">
      <div class="result-box">
        <div style="font-size:48px">${em}</div>
        <div class="score-big">${Q.score}/${Q.qs.length}</div>
        <div class="score-msg">${pct}% — ${msg}</div>
        <button class="btn btn-g" onclick="startQuiz()" style="margin-right:10px">Try Again</button>
        <button class="btn btn-out" onclick="setMode('study')">Back to Study</button>
      </div>
    </div>
  `;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function setMod(m) {
  mod=m; topic=null; ci=0; flipped=false; listView=false;
  Q={qs:[],cur:0,score:0,answered:false,chosen:null};
  renderTabs(); render();
}
function setTopic(t) { topic=t; ci=0; flipped=false; render(); }
function setMode(m) { mode=m; Q={qs:[],cur:0,score:0,answered:false,chosen:null}; render(); }
function setListView(v) { listView=v; render(); }
function flip() { flipped=!flipped; render(); }
function nextCard() { const w=getWords(); if(ci<w.length-1){ci++;flipped=false;render();} }
function prevCard() { if(ci>0){ci--;flipped=false;render();} }
function shuffle() { const w=getWords(); ci=Math.floor(Math.random()*w.length); flipped=false; render(); }
function setQType(r) { quizReverse=r; render(); }

function startQuiz() {
  const pool = allWords();
  if (pool.length < 4) { alert('Need ≥4 words.'); return; }
  const shuffled = [...pool].sort(()=>Math.random()-.5);
  const qs = shuffled.slice(0, Math.min(10, shuffled.length)).map(word => {
    const correct = quizReverse ? word[0] : word[2];
    const wrongs = pool
      .filter(w => (quizReverse?w[0]:w[2]) !== correct)
      .sort(()=>Math.random()-.5).slice(0,3)
      .map(w => quizReverse?w[0]:w[2]);
    const options = [...wrongs, correct].sort(()=>Math.random()-.5);
    return { word, correct, options };
  });
  Q = { qs, cur:0, score:0, answered:false, chosen:null };
  render();
}

function answer(idx) {
  if (Q.answered) return;
  const q = Q.qs[Q.cur];
  const chosen = q.options[idx];
  Q.chosen = chosen;
  Q.answered = true;
  if (chosen === q.correct) Q.score++;
  render();
}

function nextQ() {
  Q.cur++; Q.answered=false; Q.chosen=null; render();
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function renderTabs() {
  document.getElementById('modTabs').innerHTML = Object.entries(MODS).map(([k,m])=>`
    <div class="mtab${mod===k?' active':''}" onclick="setMod('${k}')">
      <span class="mtab-key">${k}</span>
      <span class="mtab-name">${m.name}</span>
    </div>
  `).join('');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderTabs();
render();
</script>
</body>
</html>
