  return ans;
}

// ─── SCORE ────────────────────────────────────────────────────────────────
function norm(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'');}

function scoreEx(ex,ea){
  var score=0,total=0,results=[];
  if(ex.type==='gap-match'){
    for(var g=1;g<=ex.numGaps;g++){
      total++;
      var ua=(ea[g]||'').toUpperCase();
      var ca=ex.answers[String(g)].toUpperCase();
      var ok=ua===ca;
      if(ok)score++;
      results.push({q:'Gap '+g,user:ua,correct:ca,ok:ok,expl:ex.expls[String(g)]});
    }
    if(ex.expls&&ex.expls.extra){results.push({q:'Extra sentence',user:'',correct:ex.extra,ok:true,expl:ex.expls.extra,info:true});}
  } else if(ex.type==='single-mcq'){
    total=1;
    var ua=(ea||'').toLowerCase();
    var ca=ex.answer.toLowerCase();
    var ok=ua===ca;
    if(ok)score=1;
    results.push({q:'Summary choice',user:ua,correct:ca,ok:ok,expl:ex.expl});
  } else if(ex.type==='true-false'){
    ex.statements.forEach(function(st,si){
      total++;
      var ua=(ea[si]||'').toUpperCase();
      var ca=st.answer.toUpperCase();
      var ok=ua===ca;
      if(ok)score++;
      results.push({q:st.text,user:ua,correct:ca,ok:ok,expl:st.expl});
    });
  } else if(ex.type==='short-answer'){
    ex.questions.forEach(function(q,qi){
      total++;
      var ua=(ea[qi]||'').toLowerCase();
      var kws=q.kw||[];
      var ok=kws.some(function(k){return ua.indexOf(k.toLowerCase())>=0;});
      if(!ok&&ua.length>1)ok=norm(ua).indexOf(norm(q.answer))>=0;
      if(ok)score++;
      results.push({q:q.text,user:ea[qi]||'',correct:q.answer,ok:ok,expl:q.expl});
    });
  } else if(ex.type==='mcq-list'){
    ex.questions.forEach(function(q,qi){
      total++;
      var ua=(ea[qi]||'').toLowerCase();
      var ca=q.answer.toLowerCase();
      var ok=ua===ca;
      if(ok)score++;
      results.push({q:q.text,user:ua,correct:ca,ok:ok,expl:q.expl});
    });
  } else if(ex.type==='heading-match'){
    for(var n=1;n<=ex.numParas;n++){
      total++;
      var ua=(ea[n]||'').toUpperCase();
      var ca=ex.answers[String(n)].toUpperCase();
      var ok=ua===ca;
      if(ok)score++;
      results.push({q:'Paragraph '+n,user:ua,correct:ca,ok:ok,expl:ex.expls[String(n)]});
    }
  } else if(ex.type==='person-match'){
    ex.statements.forEach(function(st,si){
      total++;
      var ua=(ea[si]||'').trim();
      var ca=st.answer;
      var ok=norm(ua)===norm(ca)||norm(ua)===norm(st.answer);
      if(ok)score++;
      results.push({q:st.text,user:ua,correct:ca,ok:ok,expl:st.expl});
    });
  } else if(ex.type==='text-match'){
    ex.questions.forEach(function(q,qi){
      total++;
      var ua=(ea[qi]||'').toUpperCase();
      var ca=q.answer.toUpperCase();
      var ok=ua===ca||(qi===0&&(ua==='A'||ua==='C'));
      if(ok)score++;
      results.push({q:q.text,user:ua,correct:ca,ok:ok,expl:q.expl});
    });
  } else if(ex.type==='ordering'){
    ex.events.forEach(function(ev){
      total++;
      var ua=(ea[ev.l]||'').trim();
      var ca=ex.answers[ev.l];
      var ok=ua===ca;
      if(ok)score++;
      results.push({q:ev.text,user:ua,correct:ca,ok:ok,expl:ex.expls[ev.l]});
    });
  } else if(ex.type==='para-fill'){
    ex.items.forEach(function(item,ii){
      var ua=ea[ii]||{para:'',fill:''};
      // Para letter
      total++;
      var okP=ua.para.toUpperCase()===item.para.toUpperCase();
      if(okP)score++;
      // Fill word
      total++;
      var fillU=ua.fill.toLowerCase().replace(/[^a-z0-9 ]/g,'');
      var kws=item.kw||[];
      var okF=kws.some(function(k){return fillU.indexOf(k.toLowerCase())>=0;});
      if(!okF)okF=norm(fillU)===norm(item.fill);
      if(okF)score++;
      var okBoth=okP&&okF;
      results.push({q:'Item '+(ii+1)+': '+item.text,
        user:'Para '+ua.para+' / "'+ua.fill+'"',
        correct:'Para '+item.para+' / "'+item.fill+'"',
        ok:okBoth,partial:(!okBoth&&(okP||okF)),okP:okP,okF:okF,expl:item.expl});
    });
  } else if(ex.type==='number-fill'){
    var gi=0;
    ex.groups.forEach(function(g){
      g.items.forEach(function(item){
        total++;
        var ua=(ea[gi]||'').toLowerCase();
        var kws=item.kw||[];
        var ok=kws.some(function(k){return ua.indexOf(k.toLowerCase())>=0;});
        if(!ok&&ua.length>2)ok=norm(ua).indexOf(norm(item.meaning).substring(0,8))>=0;
        if(ok)score++;
        results.push({q:item.num+' ('+g.label+')',user:ea[gi]||'',correct:item.meaning,ok:ok,expl:item.expl});
        gi++;
      });
    });
  }
  return{score:score,total:total,results:results};
}

function scoreAll(userAns){
  var p=P[state.cur],totalScore=0,totalMax=0,exResults=[];
  p.exercises.forEach(function(ex,ei){
    var r=scoreEx(ex,userAns[ei]||{});
    totalScore+=r.score;totalMax+=r.total;exResults.push(r);
  });
  return{score:totalScore,total:totalMax,pct:totalMax>0?Math.round(totalScore/totalMax*100):0,exResults:exResults};
}

// ─── SUBMIT ────────────────────────────────────────────────────────────────
function submitPractice(){
  stopTimer();
  var ua=collectAnswers();
  state.userAnswers=ua;
  state.submitted=true;
  var sr=scoreAll(ua);
  sr.time=timers[state.cur];
  sr.attempt=attempts[state.cur].length+1;
  attempts[state.cur].push(sr);
  render();
}

function redoPractice(){
  stopTimer();
  timers[state.cur]=0;
  state.submitted=false;
  state.userAnswers={};
  state.viewAttempt=null;
  render();
  setTimeout(startTimer,300);
}

function goPractice(i){
  stopTimer();
  state.cur=i;state.submitted=false;state.userAnswers={};state.viewAttempt=null;
  render();
  setTimeout(startTimer,300);
}

  } else if(ex.type==='person-match'){
    h+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">';
    ex.people.forEach(function(p){h+='<span style="background:#f0f4ff;border:1px solid #4f8ef7;padding:3px 10px;border-radius:12px;font-size:.85rem"><b>'+p.num+'</b> = '+p.name+'</span>';});
    h+='</div>';
    ex.statements.forEach(function(st,si){
      h+='<div class="match-row"><span class="match-label" style="color:#856404"><b>'+st.l+')</b></span>';
      h+='<span class="match-text">'+st.text+'</span>';
      h+='<select class="match-sel" id="'+id+'pm'+si+'"><option value="">–</option>';
      ex.people.forEach(function(p){h+='<option value="'+p.num+'">'+p.num+'</option>';});
      h+='</select></div>';
    });
  } else if(ex.type==='text-match'){
    h+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">';
    ex.texts.forEach(function(t){h+='<span style="background:#f0f4ff;border:1px solid #4f8ef7;padding:3px 10px;border-radius:12px;font-size:.85rem"><b>'+t.l+'</b> = '+t.t+'</span>';});
    h+='</div>';
    ex.questions.forEach(function(q,qi){
      h+='<div class="match-row"><span class="match-label"><b>'+(qi+1)+'.</b></span>';
      h+='<span class="match-text">'+q.text+'</span>';
      h+='<select class="match-sel" id="'+id+'tm'+qi+'"><option value="">–</option>';
      ex.texts.forEach(function(t){h+='<option value="'+t.l+'">'+t.l+'</option>';});
      h+='</select></div>';
    });
  } else if(ex.type==='ordering'){
    h+='<p style="font-size:.82rem;color:#888;margin-bottom:8px">Enter the position number (1–7) for each event:</p>';
    ex.events.forEach(function(ev,vi){
      h+='<div class="ord-row"><span class="ord-letter">'+ev.l+')</span>';
      h+='<input class="ord-inp" id="'+id+'or'+vi+'" type="number" min="1" max="'+ex.events.length+'" placeholder="#">';
      h+='<span class="ord-text">'+ev.text+'</span></div>';
    });
  } else if(ex.type==='para-fill'){
    h+='<div class="pf-labels"><span>Para</span><span style="width:110px">Fill word(s)</span></div>';
    ex.items.forEach(function(item,ii){
      h+='<div class="pf-row"><span class="pf-num">'+(ii+1)+'.</span>';
      h+='<span class="pf-text">'+item.text+'</span>';
      h+='<select class="pf-para" id="'+id+'pf'+ii+'p"><option value="">–</option>';
      ['A','B','C','D'].forEach(function(l){h+='<option value="'+l+'">'+l+'</option>';});
      h+='</select>';
      h+='<input class="pf-fill" id="'+id+'pf'+ii+'f" placeholder="word(s)…">';
      h+='</div>';
    });
  } else if(ex.type==='number-fill'){
    ex.groups.forEach(function(g,gi2){
      h+='<div class="nf-group"><div class="nf-grouplabel">'+g.label+'</div>';
      var offset=0;
      for(var x=0;x<gi2;x++)offset+=ex.groups[x].items.length;
      g.items.forEach(function(item,ii){
        var absIdx=offset+ii;
        h+='<div class="nf-row"><span class="nf-num">'+item.num+'</span>';
        h+='<input class="nf-inp" id="'+id+'nf'+absIdx+'" placeholder="Explain the significance…"></div>';
      });
      h+='</div>';
    });
  }
  h+='</div>';
  return h;
}

// ─── RENDER RESULTS ────────────────────────────────────────────────────────
function renderResults(sr){
  var pct=sr.pct,p=P[state.cur];
  var col=pct>=80?'#27ae60':pct>=60?'#f39c12':'#e74c3c';
  var h='<div class="res-banner '+(pct>=60?'res-pass':'res-fail')+'">';
  h+='Attempt '+sr.attempt+': <span style="font-size:1.4rem">'+pct+'%</span> ('+sr.score+'/'+sr.total+' points) — '+fmt(sr.time)+'</div>';

  p.exercises.forEach(function(ex,ei){
    var er=sr.exResults[ei];
    h+='<div style="margin-bottom:6px;font-weight:700;color:#1a1a2e">'+ex.title+' ('+er.score+'/'+er.total+')</div>';
    er.results.forEach(function(r){
      if(r.info)return;
      var cls=r.ok?'correct':(r.partial?'partial':'wrong');
      var icon=r.ok?'✅':(r.partial?'⚠️':'❌');
      h+='<div class="q-result"><div class="q-result-head '+cls+'">';
      h+=icon+' '+r.q;
      if(!r.ok){h+=' — Your answer: <b>'+r.user+'</b> | Correct: <b>'+r.correct+'</b>';}
      h+='</div>';
      if(r.expl)h+=EX(r.expl);
      h+='</div>';
    });
  });
  return h;
}

// ─── T/F CLICK HANDLER ────────────────────────────────────────────────────
function tfClick(name,val){
  document.getElementById(name+val).checked=true;
  var other=val==='T'?'F':'T';
  document.getElementById(name+'B'+val).className='tf-btn sel-'+val;
  document.getElementById(name+'B'+other).className='tf-btn';
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────
function render(){
  var app=document.getElementById('app');
  if(state.showReport){app.innerHTML=renderReportScreen();return;}

  var p=P[state.cur];
  // TABS
  var tabsH='';
  P.forEach(function(pr,i){
    var cls='tab'+(i===state.cur?' active':'')+(attempts[i].length>0?' done':'');
    tabsH+='<div class="'+cls+'" onclick="goPractice('+i+')">'+pr.emoji+' P'+pr.id+'</div>';
  });

  // ATTEMPT TAGS
  var attH='';
  if(attempts[state.cur].length>0){
    attH='<div class="attempt-tags">';
    attempts[state.cur].forEach(function(a,i){
      var best=a.pct===Math.max.apply(null,attempts[state.cur].map(function(x){return x.pct;}));
      var cls='atag '+(best?'best':a.pct>=60?'pass':'fail');
      attH+='<div class="'+cls+'" onclick="viewAttempt('+i+')">Attempt '+(i+1)+': '+a.pct+'%</div>';
    });
    attH+='</div>';
  }

  // QPANEL content
  var qContent='';
  if(state.viewAttempt!==null&&!state.submitted){
    var vsr=attempts[state.cur][state.viewAttempt];
    qContent=attH+'<h3 style="margin-bottom:12px;color:#1a1a2e">📊 Attempt '+(state.viewAttempt+1)+' Results</h3>';
    qContent+=renderResults(vsr);
    qContent+='<div class="sub-row"><button class="redo-btn" onclick="redoPractice()">🔄 Try Again</button>';
    qContent+='<button class="back-btn" onclick="backFromView()">← Back to Practice</button></div>';
  } else if(state.submitted){
    var sr=attempts[state.cur][attempts[state.cur].length-1];
    qContent=attH+renderResults(sr);
    qContent+='<div class="sub-row"><button class="redo-btn" onclick="redoPractice()">🔄 Try Again</button></div>';
  } else {
    qContent=attH;
    p.exercises.forEach(function(ex,ei){qContent+=renderExInput(ex,ei,p.id);});
    qContent+='<div class="sub-row"><button class="sub-btn" onclick="submitPractice()">✅ Submit & Check Answers</button></div>';
  }

  app.innerHTML=
    '<div class="brandbar"><span>Huong Stella Paradigm</span></div>'+
    '<div class="topbar">'+
      '<div class="apptitle">📖 Reading Practice Level 1</div>'+
      '<div class="tabs">'+tabsH+'</div>'+
      '<div class="student-inputs">'+
        '<input class="stu-input" placeholder="Tên học viên" value="'+studentName.replace(/"/g,'&quot;')+'" oninput="studentName=this.value">'+
        '<input class="stu-input" placeholder="Email học viên" value="'+studentEmail.replace(/"/g,'&quot;')+'" oninput="studentEmail=this.value">'+
      '</div>'+
      '<div class="timer-chip" id="timer">'+fmt(timers[state.cur])+'</div>'+
      '<button class="rpt-btn" onclick="showReportFn()">📊 Report</button>'+
    '</div>'+
    '<div class="split">'+
      '<div class="textpanel">'+p.textHTML+'</div>'+
      '<div class="qpanel">'+
        '<div style="font-size:.8rem;color:#888;margin-bottom:8px">📌 '+p.topic+'</div>'+
        '<h2 style="font-size:1.1rem;color:#1a1a2e;margin-bottom:12px">'+p.emoji+' Practice '+p.id+': '+p.title+'</h2>'+
        qContent+
      '</div>'+
    '</div>';
}

function viewAttempt(i){state.viewAttempt=i;state.submitted=false;render();}
function backFromView(){state.viewAttempt=null;render();}
function showReportFn(){state.showReport=true;stopTimer();render();}
function backFromReport(){state.showReport=false;render();setTimeout(startTimer,200);}

// ─── REPORT SCREEN ─────────────────────────────────────────────────────────
function renderReportScreen(){
  var totScore=0,totMax=0,practiceRows='',typeErrors={},topicErrors={};

  P.forEach(function(p,i){
    var ats=attempts[i];
    if(ats.length===0){
      practiceRows+='<tr><td>P'+p.id+' – '+p.title+'</td><td colspan="4" style="color:#aaa;font-style:italic">Not attempted</td></tr>';
      return;
    }
    var best=ats.reduce(function(b,a){return a.pct>b.pct?a:b;},ats[0]);
    var last=ats[ats.length-1];
    totScore+=last.score;totMax+=last.total;

    var trend=ats.length>1?(last.pct>ats[ats.length-2].pct?'<span class="trend-up">↑</span>':'<span class="trend-dn">↓</span>'):'–';
    var badge=best.pct>=80?'badge-g':best.pct>=60?'badge-y':'badge-r';
    practiceRows+='<tr><td>'+p.emoji+' P'+p.id+' – '+p.title+'</td>';
    practiceRows+='<td><span class="badge '+badge+'">'+best.pct+'%</span></td>';
    practiceRows+='<td>'+last.pct+'%</td>';
    practiceRows+='<td>'+fmt(best.time)+'</td>';
    practiceRows+='<td>'+trend+'</td></tr>';

    // Collect type/topic errors from last attempt
    p.exercises.forEach(function(ex,ei){
      var er=last.exResults[ei];
      if(!typeErrors[ex.type])typeErrors[ex.type]={wrong:0,total:0};
      typeErrors[ex.type].wrong+=er.total-er.score;
      typeErrors[ex.type].total+=er.total;
    });
    if(!topicErrors[p.topic])topicErrors[p.topic]={wrong:0,total:0,title:p.title};
    topicErrors[p.topic].wrong+=last.total-last.score;
    topicErrors[p.topic].total+=last.total;
  });

  var ovPct=totMax>0?Math.round(totScore/totMax*100):0;
  var ovBadge=ovPct>=80?'#27ae60':ovPct>=60?'#f39c12':'#e74c3c';

  // Type error table
  var typeRows='';
  var typeList=Object.keys(typeErrors).map(function(k){
    return{type:k,pct:Math.round(typeErrors[k].wrong/typeErrors[k].total*100),w:typeErrors[k].wrong,t:typeErrors[k].total};
  }).sort(function(a,b){return b.pct-a.pct;});
  typeList.forEach(function(t){
    var typeName={
      'gap-match':'Gap matching','single-mcq':'Multiple choice (single)',
      'mcq-list':'Multiple choice (list)','true-false':'True / False',
      'heading-match':'Heading matching','person-match':'Person matching',
      'text-match':'Text matching','ordering':'Event ordering',
      'short-answer':'Short answer','para-fill':'Paragraph + fill',
      'number-fill':'Number significance'
    }[t.type]||t.type;
    var badge=t.pct>=40?'badge-r':t.pct>=20?'badge-y':'badge-g';
    typeRows+='<tr><td>'+typeName+'</td><td>'+t.w+'/'+t.t+'</td><td><span class="badge '+badge+'">'+t.pct+'% error</span></td></tr>';
  });

  // Topic rows
  var topicRows='';
  Object.keys(topicErrors).forEach(function(k){
    var t=topicErrors[k];
    var errPct=Math.round(t.wrong/t.total*100);
    var badge=errPct>=40?'badge-r':errPct>=20?'badge-y':'badge-g';
    topicRows+='<tr><td>'+k+'</td><td><span class="badge '+badge+'">'+errPct+'% error</span></td></tr>';
  });

  // Recommendations
  var recs=[];
  typeList.forEach(function(t){
    if(t.pct>=30){
      var tips={
        'gap-match':'Practice gap-fill: read the sentence before AND after each gap. Look for topic continuity and grammar signals (connectors like "but", "so", "however").',
        'single-mcq':'For summary MCQs: identify the TWO main ideas of the text and eliminate options that are too narrow, too broad, or factually wrong.',
        'mcq-list':'For MCQs: use process of elimination. Find the paragraph for each question first, then compare each option against the text.',
        'true-false':'For True/False: read each statement very carefully. Look for words like "first", "only", "always" which are often key modifiers.',
        'heading-match':'For heading matching: identify the MAIN idea of each paragraph (often in the first sentence). Match to the heading with the closest meaning.',
        'person-match':'For person matching: underline who says what. Professions/roles help identify speakers. Paraphrase alert: the statement won\'t copy the text word-for-word.',
        'text-match':'For text matching: read question keywords first, then scan each text for those keywords or their paraphrases.',
        'ordering':'For ordering: find time words (first, then, later, after, before, next day). Map events to the chronological narrative.',
        'short-answer':'For short answers: use keyword matching strategy. Include at least one specific word from the text in your answer.',
        'para-fill':'For paragraph + fill: identify the KEY WORD in the sentence → scan each paragraph heading → then find the specific word in that paragraph.',
        'number-fill':'For number significance: every number appears in context. Find the number in the text → read the whole sentence around it → paraphrase in your own words.'
      };
      recs.push({type:'warn',text:'<b>'+({
        'gap-match':'Gap matching','single-mcq':'Summary MCQ','mcq-list':'Multiple choice',
        'true-false':'True/False','heading-match':'Heading matching','person-match':'Person matching',
        'text-match':'Text matching','ordering':'Event ordering','short-answer':'Short answer',
        'para-fill':'Paragraph fill','number-fill':'Number significance'
      }[t.type]||t.type)+'</b> ('+t.pct+'% error rate): '+(tips[t.type]||'Review this exercise type.')});
    }
  });

  if(ovPct<60)recs.push({type:'warn',text:'<b>Overall score below 60%:</b> Focus on reading the WHOLE paragraph before answering. Don\'t answer from the first sentence alone.'});
  if(ovPct>=60&&ovPct<80)recs.push({type:'',text:'<b>Good progress!</b> To move from 60% → 80%: practise spotting paraphrase (synonyms, grammar changes) between question wording and text.'});
  if(ovPct>=80)recs.push({type:'ok',text:'<b>Excellent!</b> Maintain this level by timing yourself: aim to complete each practice in under 12 minutes.'});
  recs.push({type:'',text:'<b>Vocabulary:</b> When you miss an answer, underline the key word in the question and find its paraphrase in the text. Build a "paraphrase notebook".'});
  recs.push({type:'',text:'<b>Reading skill – skimming:</b> Read the questions FIRST, then skim the text to find the relevant section before reading carefully.'});

  var recsH=recs.map(function(r){return '<div class="rec-item '+r.type+'">'+r.text+'</div>';}).join('');

  var h='<div class="brandbar"><span>Huong Stella Paradigm</span></div>';
  h+='<div style="padding:72px 0 0 0"></div>';
  h+='<button class="back-btn" onclick="backFromReport()">← Back to Practice</button>';
  h+='<div class="report-screen">';
  h+='<h1>📊 Results Report</h1>';
  h+='<div class="sbox"><div class="ov-card">';
  h+='<div class="ov-pct" style="color:'+ovBadge+'">'+ovPct+'%</div>';
  h+='<div class="ov-info"><div class="ov-label">Overall Score</div>';
  h+='<div class="ov-pts">'+totScore+' / '+totMax+' points</div>';
  h+='<div class="score-bar-wrap" style="margin-top:8px"><div class="score-bar" style="width:'+ovPct+'%;background:'+ovBadge+'"></div></div></div></div></div>';

  h+='<div class="sbox"><h2>📋 Per-Practice Results</h2>';
  h+='<table class="rtable"><tr><th>Practice</th><th>Best %</th><th>Last %</th><th>Best Time</th><th>Trend</th></tr>'+practiceRows+'</table></div>';

  h+='<div class="sbox"><h2>❌ Error Rate by Question Type</h2>';
  h+='<table class="rtable"><tr><th>Question Type</th><th>Errors</th><th>Error Rate</th></tr>'+typeRows+'</table></div>';

  h+='<div class="sbox"><h2>📚 Error Rate by Topic</h2>';
  h+='<table class="rtable"><tr><th>Topic</th><th>Error Rate</th></tr>'+topicRows+'</table></div>';

  h+='<div class="sbox"><h2>💡 Recommendations</h2>'+recsH+'</div>';

  h+='<div class="sbox"><h2>📤 Export & Share</h2>';
  h+='<button class="xbtn pdf" onclick="exportPDF()">📄 Export Results (PDF)</button>';
  h+='<button class="xbtn em" onclick="sendEmail()">📧 Send to Teacher</button>';
  h+='</div></div>';
  return h;
}

  doc+='th{background:#1a1a2e;color:#fff;padding:6px 8px;text-align:left;font-weight:600}';
  doc+='td{padding:5px 8px;border-bottom:1px solid #eee;vertical-align:top}';
  doc+='.summary-tbl td:nth-child(3){font-weight:700}';
  doc+='.page-break{page-break-before:always}';
  doc+='</style>';
  doc+='</head><body>';

  // COVER PAGE
  doc+='<div class="cover">';
  doc+='<div class="cover-brand">Huong Stella Paradigm</div>';
  doc+='<div class="student-name">'+(studentName||'Học viên')+'</div>';
  if(studentEmail)doc+='<div class="student-email">'+studentEmail+'</div>';
  doc+='<h1>Reading Practice<br>Level 1</h1>';
  doc+='<div class="sub">Results Report</div>';
  doc+='<div class="score-big" style="color:'+ovCol+'">'+ovPct+'%</div>';
  doc+='<div class="score-label">Overall Score — '+totScore+' / '+totMax+' points</div>';
  doc+='<div class="meta">'+new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})+'</div>';
  doc+='</div>';

  // SUMMARY TABLE
  doc+='<div class="section"><h2>📋 Practice Summary</h2>';
  doc+='<table class="summary-tbl"><tr><th>Practice</th><th>Topic</th><th>Attempts</th><th>Best</th><th>Last</th><th>Best Time</th></tr>';
  P.forEach(function(p,i){
    var pd=practiceData[i];
    if(!pd){doc+='<tr><td>'+p.emoji+' P'+p.id+' '+p.title+'</td><td>'+p.topic+'</td><td colspan="4" style="color:#aaa">Not attempted</td></tr>';return;}
    var bestCol=pd.best.pct>=80?'#1a7a4a':pd.best.pct>=60?'#c07a00':'#b0180a';
    doc+='<tr><td>'+p.emoji+' P'+p.id+' '+p.title+'</td><td>'+p.topic+'</td>';
    doc+='<td style="text-align:center">'+pd.ats.length+'</td>';
    doc+='<td style="font-weight:700;color:'+bestCol+'">'+pd.best.pct+'%</td>';
    doc+='<td>'+pd.last.pct+'%</td>';
    doc+='<td>'+fmt(pd.best.time)+'</td></tr>';
  });
  doc+='</table></div>';

  // ERROR ANALYSIS
  doc+='<div class="section"><h2>❌ Error Rate by Question Type</h2>';
  doc+='<table><tr><th>Question Type</th><th>Errors</th><th>Error Rate</th></tr>'+typeRows+'</table></div>';

  // DETAILED RESULTS PER PRACTICE
  doc+='<div class="section page-break"><h2>📝 Detailed Results by Practice</h2>';
  P.forEach(function(p,i){
    var pd=practiceData[i];
    var pct=pd?pd.last.pct:0;
    var pCol=pct>=80?'#4f8ef7':pct>=60?'#f39c12':'#e74c3c';
    doc+='<div class="pcard">';
    doc+='<div class="pcard-head">';
    doc+='<div class="ptitle">'+p.emoji+' P'+p.id+' — '+p.title+'<span style="font-weight:400;color:#aaa;font-size:9pt;margin-left:8px">'+p.topic+'</span></div>';
    if(pd){
      doc+='<div class="pbar-wrap"><div class="pbar" style="width:'+pct+'%;background:'+pCol+'"></div></div>';
      doc+='<div class="pscore" style="color:'+pCol+'">'+pct+'%</div>';
    }else{doc+='<div style="color:#aaa;font-size:9pt">Not attempted</div>';}
    doc+='</div>';
    doc+='<table><tr><th style="width:28px"></th><th>Question</th><th>Your Answer</th><th>Correct Answer</th><th>Tip</th></tr>';
    doc+=detailRows(pd);
    doc+='</table></div>';
  });
  doc+='</div>';

  doc+='</body></html>';

  var sname=(studentName||'Results').replace(/[^a-zA-Z0-9_\- ]/g,'_');
  var filename=sname+'_Reading_Practice.pdf';

  var runner=[
    '<scr'+'ipt src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"><\/scr'+'ipt>',
    '<scr'+'ipt>',
    'window.addEventListener("load",function(){',
    '  html2pdf().from(document.body).set({',
    '    margin:0,',
    '    filename:"'+filename+'",',
    '    image:{type:"jpeg",quality:0.96},',
    '    html2canvas:{scale:2,useCORS:true,allowTaint:true,backgroundColor:"#1a1a2e",windowWidth:794},',
    '    jsPDF:{unit:"mm",format:[210,297],orientation:"portrait"},',
    '    pagebreak:{mode:["css"],before:".page-break",after:".cover"}',
    '  }).save().then(function(){setTimeout(function(){window.close();},800);});',
    '});',
    '<\/scr'+'ipt>',
    '</body></html>'
  ].join('\n');

  var finalDoc=doc.replace('</body></html>',runner);
  var w=window.open('','_blank','width=320,height=80,left='+Math.round(screen.width/2-160)+',top='+Math.round(screen.height/2-40));
  if(!w){alert('Vui lòng cho phép popup để xuất PDF.');return;}
  w.document.write('<html><head><title>Đang tạo PDF…</title><style>body{margin:0;display:flex;align-items:center;justify-content:center;height:80px;font-family:Arial;font-size:13px;color:#333;background:#f5f5f5}</style></head><body>⏳ Đang tạo PDF, vui lòng chờ…</body></html>');
  w.document.close();
  var blob=new Blob([finalDoc],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  w.location.href=url;
}

function sendEmail(){
  var lines=['Reading Practice Results','Date: '+new Date().toLocaleDateString(),''];
  var totScore=0,totMax=0;
  P.forEach(function(p,i){
    var ats=attempts[i];
    if(ats.length===0){lines.push('P'+p.id+' '+p.title+': Not attempted');return;}
    var last=ats[ats.length-1];
    totScore+=last.score;totMax+=last.total;
    lines.push('P'+p.id+' '+p.title+': '+last.pct+'% ('+last.score+'/'+last.total+') – '+ats.length+' attempt(s)');
  });
  lines.push('');
  lines.push('OVERALL: '+(totMax>0?Math.round(totScore/totMax*100):0)+'% ('+totScore+'/'+totMax+')');
  var body=encodeURIComponent(lines.join('\n'));
  var subj=encodeURIComponent('Reading Practice Results – '+new Date().toLocaleDateString());
  window.location.href='mailto:'+TEACHER+'?subject='+subj+'&body='+body;
}

// ─── INIT ──────────────────────────────────────────────────────────────────
render();
setTimeout(startTimer,500);
