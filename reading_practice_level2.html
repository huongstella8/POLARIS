      h+='<div class="tf-row"><div class="tf-stmt">'+st.text+'</div><div class="tf-btns">';
      h+='<input type="radio" name="'+id+'tf'+si+'" value="T" id="'+id+'tf'+si+'T" style="display:none">';
      h+='<button class="tf-btn" id="'+id+'tf'+si+'BT" onclick="tfClick(\''+id+'tf'+si+'\',\'T\')">T</button>';
      h+='<input type="radio" name="'+id+'tf'+si+'" value="F" id="'+id+'tf'+si+'F" style="display:none">';
      h+='<button class="tf-btn" id="'+id+'tf'+si+'BF" onclick="tfClick(\''+id+'tf'+si+'\',\'F\')">F</button>';
      h+='</div></div>';
    });
  } else if(ex.type==='true-false-ng'){
    ex.statements.forEach(function(st,si){
      h+='<div class="tf-row"><div class="tf-stmt">'+st.text+'</div><div class="tf-btns">';
      h+='<input type="radio" name="'+id+'tf'+si+'" value="T" id="'+id+'tf'+si+'T" style="display:none">';
      h+='<button class="tf-btn" id="'+id+'tf'+si+'BT" onclick="tfClick(\''+id+'tf'+si+'\',\'T\')">T</button>';
      h+='<input type="radio" name="'+id+'tf'+si+'" value="F" id="'+id+'tf'+si+'F" style="display:none">';
      h+='<button class="tf-btn" id="'+id+'tf'+si+'BF" onclick="tfClick(\''+id+'tf'+si+'\',\'F\')">F</button>';
      h+='<input type="radio" name="'+id+'tf'+si+'" value="NG" id="'+id+'tf'+si+'NG" style="display:none">';
      h+='<button class="tf-btn" id="'+id+'tf'+si+'BNG" onclick="tfClick(\''+id+'tf'+si+'\',\'NG\')">NG</button>';
      h+='</div></div>';
    });
  } else if(ex.type==='short-answer'){
    ex.questions.forEach(function(q,qi){
      h+='<div class="sa-row"><div class="sa-q"><b>'+(qi+1)+'.</b> '+q.text+'</div>';
      h+='<input class="sa-inp" id="'+id+'sa'+qi+'" placeholder="Type your answer…"></div>';
    });
  } else if(ex.type==='mcq-list'){
    ex.questions.forEach(function(q,qi){
      h+='<div style="margin-bottom:14px"><div class="sa-q"><b>'+(qi+1)+'.</b> '+q.text+'</div>';
      q.opts.forEach(function(o){
        h+='<label class="mcq-opt"><input type="radio" name="'+id+'mcq'+qi+'" value="'+o.l+'"> '+o.l.toUpperCase()+'. '+o.t+'</label>';
      });
      h+='</div>';
    });
  } else if(ex.type==='text-match'){
    h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">';
    ex.texts.forEach(function(t){h+='<span style="background:#f0f4ff;border:1px solid #4f8ef7;padding:3px 10px;border-radius:12px;font-size:.85rem"><b>'+t.l+'</b> = '+t.t+'</span>';});
    h+='</div>';
    ex.questions.forEach(function(q,qi){
      h+='<div class="match-row"><span class="match-label" style="min-width:30px;color:#856404"><b>'+(qi+1)+'.</b></span>';
      h+='<span class="match-text">'+q.text+'</span>';
      h+='<select class="match-sel" id="'+id+'tm'+qi+'"><option value="">–</option>';
      ex.texts.forEach(function(t){h+='<option value="'+t.l+'">'+t.l+'</option>';});
      h+='</select></div>';
    });
  }
  return h+'</div>';
}

function renderResults(sr){
  var pct=sr.pct,p=P[state.cur];
  var h='<div class="res-banner '+(pct>=60?'res-pass':'res-fail')+'">Attempt '+sr.attempt+': <span style="font-size:1.4rem">'+pct+'%</span> ('+sr.score+'/'+sr.total+' points) — '+fmt(sr.time)+'</div>';
  p.exercises.forEach(function(ex,ei){
    var er=sr.exResults[ei];
    h+='<div style="margin-bottom:6px;font-weight:700;color:#1a1a2e">'+ex.title+' ('+er.score+'/'+er.total+')</div>';
    er.results.forEach(function(r){
      if(r.info)return;
      var cls=r.ok?'correct':'wrong',icon=r.ok?'✅':'❌';
      h+='<div class="q-result"><div class="q-result-head '+cls+'">'+icon+' '+r.q;
      if(!r.ok)h+=' — Your answer: <b>'+r.user+'</b> | Correct: <b>'+r.correct+'</b>';
      h+='</div>';
      if(r.expl)h+=EX(r.expl);
      h+='</div>';
    });
  });
  return h;
}

function render(){
  var app=document.getElementById('app');
  if(VS.active){app.innerHTML=renderVocabScreen();return;}
  if(state.showReport){app.innerHTML=renderReportScreen();return;}
  var p=P[state.cur];
  var tabsH='';
  P.forEach(function(pr,i){
    var cls='tab'+(i===state.cur?' active':'')+(attempts[i].length>0?' done':'');
    tabsH+='<div class="'+cls+'" onclick="goPractice('+i+')">'+pr.emoji+' P'+pr.id+'</div>';
  });
  var attH='';
  if(attempts[state.cur].length>0){
    attH='<div class="attempt-tags">';
    attempts[state.cur].forEach(function(a,i){
      var best=a.pct===Math.max.apply(null,attempts[state.cur].map(function(x){return x.pct;}));
      var cls='atag '+(best?'best':a.pct>=60?'pass':'fail');
      attH+='<div class="'+cls+'" onclick="viewAttempt('+i+')">Attempt '+(i+1)+': '+a.pct+'%</div>';
    });
    attH+='</div>';
  }
  var qContent='';
  if(state.viewAttempt!==null&&!state.submitted){
    var vsr=attempts[state.cur][state.viewAttempt];
    qContent=attH+'<h3 style="margin-bottom:12px;color:#1a1a2e">📊 Attempt '+(state.viewAttempt+1)+' Results</h3>'+renderResults(vsr);
    qContent+='<div class="sub-row"><button class="redo-btn" onclick="redoPractice()">🔄 Try Again</button><button class="back-btn" onclick="backFromView()">← Back to Practice</button></div>';
  } else if(state.submitted){
    var sr=attempts[state.cur][attempts[state.cur].length-1];
    qContent=attH+renderResults(sr);
    qContent+='<div class="sub-row"><button class="redo-btn" onclick="redoPractice()">🔄 Try Again</button></div>';
  } else {
    qContent=attH;
    p.exercises.forEach(function(ex,ei){qContent+=renderExInput(ex,ei,p.id);});
    qContent+='<div class="sub-row"><button class="sub-btn" onclick="submitPractice()">✅ Submit & Check Answers</button></div>';
  }
  app.innerHTML=
    '<div class="brandbar"><span>Huong Stella Paradigm</span></div>'+
    '<div class="topbar">'+
      '<div class="apptitle">📖 Reading Practice Level 2</div>'+
      '<div class="tabs">'+tabsH+'</div>'+
      '<div class="student-inputs">'+
        '<input class="stu-input" placeholder="Tên học viên" value="'+studentName.replace(/"/g,'&quot;')+'" oninput="studentName=this.value">'+
        '<input class="stu-input" placeholder="Email học viên" value="'+studentEmail.replace(/"/g,'&quot;')+'" oninput="studentEmail=this.value">'+
      '</div>'+
      '<div class="timer-chip" id="timer">'+fmt(timers[state.cur])+'</div>'+
      '<button class="rpt-btn" onclick="showReportFn()">📊 Report</button>'+
      '<button class="vocab-btn" onclick="showVocab()">📚 Vocab</button>'+
    '</div>'+
    '<div class="split">'+
      '<div class="textpanel">'+p.textHTML+'</div>'+
      '<div class="qpanel">'+
        '<div style="font-size:.8rem;color:#888;margin-bottom:8px">📌 '+p.topic+'</div>'+
        '<h2 style="font-size:1.1rem;color:#1a1a2e;margin-bottom:12px">'+p.emoji+' Practice '+p.id+': '+p.title+'</h2>'+
        qContent+
      '</div>'+
    '</div>';
}

function viewAttempt(i){state.viewAttempt=i;state.submitted=false;render();}
function backFromView(){state.viewAttempt=null;render();}
function showReportFn(){state.showReport=true;stopTimer();render();}
function backFromReport(){state.showReport=false;render();setTimeout(startTimer,200);}

function renderReportScreen(){
  var totScore=0,totMax=0,practiceRows='',typeErrors={},topicErrors={};
  P.forEach(function(p,i){
    var ats=attempts[i];
    if(!ats.length){practiceRows+='<tr><td>P'+p.id+' – '+p.title+'</td><td colspan="4" style="color:#aaa;font-style:italic">Not attempted</td></tr>';return;}
    var best=ats.reduce(function(b,a){return a.pct>b.pct?a:b;},ats[0]),last=ats[ats.length-1];
    totScore+=last.score;totMax+=last.total;
    var trend=ats.length>1?(last.pct>ats[ats.length-2].pct?'<span class="trend-up">↑</span>':'<span class="trend-dn">↓</span>'):'–';
    var badge=best.pct>=80?'badge-g':best.pct>=60?'badge-y':'badge-r';
    practiceRows+='<tr><td>'+p.emoji+' P'+p.id+' – '+p.title+'</td><td><span class="badge '+badge+'">'+best.pct+'%</span></td><td>'+last.pct+'%</td><td>'+fmt(best.time)+'</td><td>'+trend+'</td></tr>';
    p.exercises.forEach(function(ex,ei){
      var er=last.exResults[ei];
      if(!typeErrors[ex.type])typeErrors[ex.type]={wrong:0,total:0};
      typeErrors[ex.type].wrong+=er.total-er.score;typeErrors[ex.type].total+=er.total;
    });
    if(!topicErrors[p.topic])topicErrors[p.topic]={wrong:0,total:0};
    topicErrors[p.topic].wrong+=last.total-last.score;topicErrors[p.topic].total+=last.total;
  });
  var ovPct=totMax>0?Math.round(totScore/totMax*100):0;
  var ovBadge=ovPct>=80?'#27ae60':ovPct>=60?'#f39c12':'#e74c3c';
  var typeRows='';
  var typeNames={'gap-match':'Gap matching','mcq-list':'Multiple choice','true-false':'True / False','true-false-ng':'T / F / Not Given','short-answer':'Short answer','text-match':'Paragraph matching'};
  Object.keys(typeErrors).sort(function(a,b){return(typeErrors[b].wrong/typeErrors[b].total)-(typeErrors[a].wrong/typeErrors[a].total);}).forEach(function(k){
    var t=typeErrors[k],ep=Math.round(t.wrong/t.total*100);
    var badge=ep>=40?'badge-r':ep>=20?'badge-y':'badge-g';
    typeRows+='<tr><td>'+(typeNames[k]||k)+'</td><td>'+t.wrong+'/'+t.total+'</td><td><span class="badge '+badge+'">'+ep+'% error</span></td></tr>';
  });
  var topicRows='';
  Object.keys(topicErrors).forEach(function(k){
    var t=topicErrors[k],ep=Math.round(t.wrong/t.total*100);
    var badge=ep>=40?'badge-r':ep>=20?'badge-y':'badge-g';
    topicRows+='<tr><td>'+k+'</td><td><span class="badge '+badge+'">'+ep+'% error</span></td></tr>';
  });
  var recs=[];
  if(ovPct<60)recs.push({type:'warn',text:'<b>Overall score below 60%:</b> Read the entire paragraph before answering. Never answer from the first sentence alone.'});
  if(ovPct>=60&&ovPct<80)recs.push({type:'',text:'<b>Good progress!</b> To reach 80%: practise spotting paraphrase – synonyms and grammar changes between the question and the text.'});
  if(ovPct>=80)recs.push({type:'ok',text:'<b>Excellent!</b> Try to complete each practice in under 12 minutes to build exam speed.'});
  recs.push({type:'',text:'<b>For T/F/NG:</b> NG means the text does not say enough to decide. If you cannot find a clear True or False signal in the text → choose NG.'});
  recs.push({type:'',text:'<b>For gap-fill:</b> Read the sentence BEFORE and AFTER each gap. Look for grammar clues (connectors: but, so, however, because).'});
  recs.push({type:'',text:'<b>For paragraph matching:</b> Scan for key nouns (names, dates, places) in the question, then find the same or a synonym in the text.'});
  var recsH=recs.map(function(r){return '<div class="rec-item '+r.type+'">'+r.text+'</div>';}).join('');
  var h='<div class="brandbar"><span>Huong Stella Paradigm</span></div>';
  h+='<div style="padding:72px 0 0 0"></div>';
  h+='<button class="back-btn" onclick="backFromReport()">← Back to Practice</button>';
  h+='<div class="report-screen"><h1>📊 Results Report – Level 2</h1>';
  h+='<div class="sbox"><div class="ov-card"><div class="ov-pct" style="color:'+ovBadge+'">'+ovPct+'%</div>';
  h+='<div class="ov-info"><div class="ov-label">Overall Score (Level 2)</div><div class="ov-pts">'+totScore+' / '+totMax+' points</div>';
  h+='<div class="score-bar-wrap"><div class="score-bar" style="width:'+ovPct+'%;background:'+ovBadge+'"></div></div></div></div></div>';
  h+='<div class="sbox"><h2>📋 Per-Practice Results</h2><table class="rtable"><tr><th>Practice</th><th>Best %</th><th>Last %</th><th>Best Time</th><th>Trend</th></tr>'+practiceRows+'</table></div>';
  h+='<div class="sbox"><h2>❌ Error Rate by Question Type</h2><table class="rtable"><tr><th>Question Type</th><th>Errors</th><th>Error Rate</th></tr>'+typeRows+'</table></div>';
  h+='<div class="sbox"><h2>📚 Error Rate by Topic</h2><table class="rtable"><tr><th>Topic</th><th>Error Rate</th></tr>'+topicRows+'</table></div>';
  h+='<div class="sbox"><h2>💡 Recommendations</h2>'+recsH+'</div>';
  h+='<div class="sbox"><h2>📧 Send to Teacher</h2><button class="xbtn em" onclick="sendEmail()">📧 Send Results to Teacher</button></div></div>';
  return h;
}

function sendEmail(){
  var lines=['Reading Practice Level 2 Results','Date: '+new Date().toLocaleDateString(),''];
  var totScore=0,totMax=0;
  P.forEach(function(p,i){
    var ats=attempts[i];
    if(!ats.length){lines.push('P'+p.id+' '+p.title+': Not attempted');return;}
    var last=ats[ats.length-1];totScore+=last.score;totMax+=last.total;
    lines.push('P'+p.id+' '+p.title+': '+last.pct+'% ('+last.score+'/'+last.total+') – '+ats.length+' attempt(s)');
  });
  lines.push('');lines.push('OVERALL: '+(totMax>0?Math.round(totScore/totMax*100):0)+'% ('+totScore+'/'+totMax+')');
  var body=encodeURIComponent(lines.join('\n'));
  var subj=encodeURIComponent('Reading Practice Level 2 Results – '+new Date().toLocaleDateString());
  window.location.href='mailto:'+TEACHER+'?subject='+subj+'&body='+body;
}

// ── VOCAB SCREEN ──
function showVocab(){VS.active=true;VS.mode='list';VS.filter='all';VS.idx=0;VS.revealed=false;VS.q=null;VS.checked=false;VS.sessionWords=[];stopTimer();render();}
function backFromVocab(){VS.active=false;render();setTimeout(startTimer,200);}
function setVF(f){VS.filter=f;VS.idx=0;VS.revealed=false;VS.q=null;VS.checked=false;VS.sessionWords=[];render();}
function setVM(m){VS.mode=m;VS.idx=0;VS.revealed=false;VS.q=null;VS.checked=false;VS.sessionWords=[];render();}
function getVW(){return VOCAB.filter(function(w){if(VS.filter==='all')return true;if(VS.filter==='weak')return vocabProgress[w.id]!=='known';if(VS.filter==='known')return vocabProgress[w.id]==='known';return w.practice===parseInt(VS.filter);});}
function shuffV(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function markV(id,s){vocabProgress[id]=s;VS.idx++;VS.revealed=false;render();}
function wt(t){var c={v:'wt-v',n:'wt-n',adj:'wt-adj',adv:'wt-adv',phr:'wt-phr'}[t]||'wt-n';return '<span class="wt '+c+'">'+t+'</span>';}
function wst(id){var s=vocabProgress[id]||'new';return s==='known'?'<div class="wstatus st-k">✓</div>':s==='learning'?'<div class="wstatus st-l">~</div>':'<div class="wstatus st-n">·</div>';}
function ptag(n){var pp=P[n-1];return pp?pp.emoji+' P'+n:'P'+n;}
function vscore(){return Object.keys(vocabProgress).filter(function(k){return vocabProgress[k]==='known';}).length;}
function getSW(){if(!VS.sessionWords.length){VS.sessionWords=shuffV(getVW().slice());}return VS.sessionWords;}
function doneScreen(sc,tot){
  return '<div class="vc-done"><div style="font-size:2.8rem;margin-bottom:14px">🎉</div><h2>Session complete!</h2><p>Score: '+sc+' / '+tot+' words</p><button class="fc-rev" onclick="VS.idx=0;VS.sessionWords=[];VS.score=0;VS.total=0;VS.q=null;VS.checked=false;render()">↩ Restart</button></div>';
}

function renderVocabScreen(){
  var known=vscore();
  var h='<div class="brandbar"><span>Huong Stella Paradigm</span></div>';
  h+='<div class="topbar"><button class="back-btn" onclick="backFromVocab()">← Back</button><div class="apptitle">📚 Vocabulary – Level 2</div><div style="flex:1"></div><div style="font-size:.78rem;color:#aaa">'+known+' / '+VOCAB.length+' known</div></div>';
  var fkeys=['all','1','2','3','4','5','6','7','8','9','weak','known'];
  var flabels={all:'All',1:'P1',2:'P2',3:'P3',4:'P4',5:'P5',6:'P6',7:'P7',8:'P8',9:'P9',weak:'⭐ Needs review',known:'✓ Known'};
  h+='<div class="vtoolbar">';
  fkeys.forEach(function(f){h+='<button class="vf-btn'+(VS.filter===f?' active':'')+'" data-vf="'+f+'" onclick="setVF(this.dataset.vf)">'+flabels[f]+'</button>';});
  h+='<div class="vsep"></div>';
  [['list','📋 List'],['flashcard','🃏 Flashcard'],['mcq','❓ MCQ'],['recall','✏️ Recall']].forEach(function(m){
    h+='<button class="vm-btn'+(VS.mode===m[0]?' active':'')+'" data-vm="'+m[0]+'" onclick="setVM(this.dataset.vm)">'+m[1]+'</button>';
  });
  h+='</div><div class="vbody">';
  if(VS.mode==='list')h+=renderVList();
  else if(VS.mode==='flashcard')h+=renderFC();
  else if(VS.mode==='mcq')h+=renderMCQv();
  else if(VS.mode==='recall')h+=renderWR();
  return h+'</div>';
}

function renderVList(){
  var words=getVW();
  if(!words.length)return '<div style="text-align:center;color:#888;padding:40px">No words match this filter.</div>';
  var h='<div class="wlist">';
  words.forEach(function(w){
    h+='<div class="wcard">';
    h+='<div class="wcard-word">'+w.word+'</div>';
    h+=spkBtn(w.word);
    h+='<span class="wipa">'+(w.ipa||'')+'</span>';
    h+=wt(w.type);
    h+='<div class="wcard-def">'+w.def+'</div>';
    h+='<div style="font-size:.68rem;color:#aaa;white-space:nowrap">'+ptag(w.practice)+'</div>';
    h+=wst(w.id)+'</div>';
  });
  return h+'</div>';
}

function renderFC(){
  var words=getSW();
  if(!words.length)return '<div style="text-align:center;color:#888;padding:40px">No words in this filter.</div>';
  if(VS.idx>=words.length){var k=words.filter(function(w){return vocabProgress[w.id]==='known';}).length;return doneScreen(k,words.length);}
  var w=words[VS.idx];
  var h='<div class="fc-wrap"><div class="fc-prog">'+(VS.idx+1)+' / '+words.length+'</div><div class="fc-card">';
  if(!VS.revealed){
    h+='<div class="fc-word">'+w.word+'</div>'+spkBtn(w.word)+'<div class="fc-ipa">'+(w.ipa||'')+'</div>'+wt(w.type);
    h+='<button class="fc-rev" onclick="VS.revealed=true;render()">Show definition</button>';
  } else {
    h+='<div class="fc-word">'+w.word+'</div>'+spkBtn(w.word)+'<div class="fc-ipa">'+(w.ipa||'')+'</div>'+wt(w.type);
    h+='<div class="fc-def">'+w.def+'</div><div class="fc-ex">'+w.example+'</div><div class="fc-src">📖 '+ptag(w.practice)+'</div>';
  }
  h+='</div>';
  if(VS.revealed){
    h+='<div class="fc-acts">';
    h+='<button class="fc-dk" data-vid="'+w.id+'" data-vs="new" onclick="markV(this.dataset.vid,this.dataset.vs)">✗ Don\'t know</button>';
    h+='<button class="fc-sl" data-vid="'+w.id+'" data-vs="learning" onclick="markV(this.dataset.vid,this.dataset.vs)">~ Still learning</button>';
    h+='<button class="fc-k" data-vid="'+w.id+'" data-vs="known" onclick="markV(this.dataset.vid,this.dataset.vs)">✓ Know it!</button>';
    h+='</div>';
  } else {
    h+='<button class="fc-skip" onclick="VS.idx++;VS.revealed=false;render()">Skip →</button>';
  }
  return h+'</div>';
}

function renderMCQv(){
  var words=getSW();
  if(!words.length)return '<div style="text-align:center;color:#888;padding:40px">No words in this filter.</div>';
  if(VS.idx>=words.length)return doneScreen(VS.score,VS.total);
  if(!VS.q||VS.q.wid!==words[VS.idx].id){
    var w=words[VS.idx];
    var wrong=VOCAB.filter(function(x){return x.id!==w.id;});shuffV(wrong);
    var opts=[{def:w.def,ok:true}];wrong.slice(0,3).forEach(function(x){opts.push({def:x.def,ok:false});});shuffV(opts);
    VS.q={wid:w.id,word:w.word,type:w.type,ipa:w.ipa,opts:opts,sel:null};VS.checked=false;
  }
  var q=VS.q;
  var h='<div class="mcq-wrap"><div class="fc-prog">'+(VS.idx+1)+' / '+words.length+' · Score: '+VS.score+'/'+VS.total+'</div>';
  h+='<div class="mcq-q"><strong style="font-size:1.3rem">'+q.word+'</strong> '+spkBtn(q.word)+' '+wt(q.type)+'<br><small style="color:#888">Which definition is correct?</small></div>';
  h+='<div class="mcq-opts">';
  q.opts.forEach(function(o,i){
    var cls='mcq-opt-v';
    if(VS.checked)cls+=o.ok?' mcq-c':(q.sel===i?' mcq-w':'');
    var clk=VS.checked?'':' onclick="VS.q.sel='+i+';VS.checked=true;'+(o.ok?'VS.score++;':'')+'VS.total++;render()"';
    h+='<div class="'+cls+'"'+clk+'>'+o.def+'</div>';
  });
  h+='</div>';
  if(VS.checked)h+='<button class="mcq-nxt" onclick="VS.idx++;VS.q=null;VS.checked=false;render()">Next →</button>';
  return h+'</div>';
}

function renderWR(){
  var words=getSW();
  if(!words.length)return '<div style="text-align:center;color:#888;padding:40px">No words in this filter.</div>';
  if(VS.idx>=words.length)return doneScreen(VS.score,VS.total);
  var w=words[VS.idx];
  var h='<div class="wr-wrap"><div class="fc-prog">'+(VS.idx+1)+' / '+words.length+' · Score: '+VS.score+'/'+VS.total+'</div>';
  h+='<div class="wr-q">'+w.def+'<br><small class="wr-hint">'+ptag(w.practice)+' · '+w.type+'</small></div>';
  if(!VS.checked){
    h+='<input class="wr-inp" id="wr-i" placeholder="Type the word…" onkeydown="if(event.key===\'Enter\')checkWR()">';
    h+='<button class="wr-chk" onclick="checkWR()">Check</button>';
  } else {
    var ua=VS.q&&VS.q.ua?VS.q.ua:'';
    var ok=ua.toLowerCase().trim()===w.word.toLowerCase().trim();
    h+='<div class="wr-res '+(ok?'wr-ok':'wr-bad')+'">';
    h+=ok?'✓ Correct! ':'✗ Answer: ';
    h+='<strong>'+w.word+'</strong> '+spkBtn(w.word)+' <span class="wipa">'+(w.ipa||'')+'</span>';
    if(!ok)h+='<br><small style="opacity:.75">You wrote: "'+ua+'"</small>';
    h+='</div><div style="font-size:.82rem;font-style:italic;color:#666;background:#f0f4ff;border-radius:8px;padding:9px 12px;margin-bottom:9px">'+w.example+'</div>';
    h+='<button class="wr-chk" onclick="VS.idx++;VS.q=null;VS.checked=false;render()">Next →</button>';
  }
  return h+'</div>';
}

function checkWR(){
  var inp=document.getElementById('wr-i');if(!inp)return;
  var words=VS.sessionWords,w=words[VS.idx],val=inp.value;
  var ok=val.toLowerCase().trim()===w.word.toLowerCase().trim();
  if(ok)VS.score++;VS.total++;VS.q={ua:val};VS.checked=true;render();
}

function speakWord(word){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(word);u.lang='en-GB';u.rate=0.82;u.pitch=1;
  window.speechSynthesis.speak(u);
}
function spkBtn(word){
  return '<button class="spk-btn" data-spk="'+word+'" onclick="speakWord(this.dataset.spk)" title="Listen">🔊</button>';
}

render();
setTimeout(startTimer,500);
</script>
</body>
</html>
