"textHTML":"<div class='ptitle'>📖 A Life Without Pain</div><div class='rp'><b>A.</b> All children hurt themselves from time to time. But when thirteen-year-old Ashlyn Blocker was younger, she had more accidents and injuries than her friends. For example, she once put her hands on a very hot engine and got a serious burn. She only knew about it when she looked at her skin. She showed her parents and they took her straight to hospital. Ashlyn simply did not know when she injured herself.</div><div class='rp'><b>B.</b> When Ashlyn was a baby, her parents knew she was different: she didn't cry. Then, when she was eight months old, they noticed there was some blood in her eye, so they took her to see a doctor. The doctor was shocked and confused when he looked at Ashlyn's eye: there was a serious cut. So why wasn't the baby girl upset? Why didn't she cry? The eye injury soon got better, but doctors realised that Ashlyn had a very unusual medical condition: she couldn't feel any pain.</div><div class='rp'><b>C.</b> This condition is very rare: only about a hundred people a year in the USA are born with it, and many of them die because of it. Pain is a natural warning: when you're ill or injured, your body hurts and this tells you there's a problem. People who can't feel pain often die young because when they break a bone or have a problem with their heart, they just don't realise.</div><div class='rp'><b>D.</b> The first few years of Ashlyn's life were very difficult. She often tripped and injured herself. Once, she broke her ankle and didn't know, so she didn't stop running. At school, Ashlyn needed a lot of attention to keep her safe. For example, in the playground, one teacher watched Ashlyn all the time. When other children fell over, the teachers could ask, 'Does it hurt?' But of course, with Ashlyn, it was not so simple, and the teachers had to search for cuts, bruises or other injuries.</div><div class='rp'><b>E.</b> When she was five, Ashlyn's story appeared in newspapers. Then she had invitations to appear on TV programmes. Scientists studied the causes of her condition and found it was a genetic disorder. For some reason, pain signals do not reach her brain. However, at the moment, there is no hope of a cure.</div><div class='rp'><b>F.</b> Ashlyn is now a teenager. She says that life is better now because she knows about her condition and she is more careful. She has a boyfriend. She wears gloves when she works with hot things in the kitchen. She says she is happy: 'Life is good. I'm enjoying myself. But yes, sometimes I wish I could feel pain. Then I could be like everyone else.'</div>",

{"id":2,"title":"Lost at Sea","topic":"Adventure – Survival at Sea","emoji":"🌊",
"textHTML":"<div class='ptitle'>📖 Lost at Sea</div><div class='rp'>A dream holiday turned into a nightmare for an American brother and sister called Dan and Kate Suski. They were enjoying a fishing trip in the Caribbean, near the stunning island of St Lucia, when their boat sank, leaving them and their captain to fight for their lives.</div><div class='rp'>The fishing trip began well enough. The weather wasn't brilliant, but Dan wasn't complaining: he had a huge fish on his line! He was trying to pull it onto the boat and Kate was helping him. But then, the captain realised there was a problem. Water was coming into the cabin and the boat was sinking fast. The captain used his radio to send a message for help. Then he shouted to the Suskis, 'Jump out! Jump out!' <span class='gm'>[1]</span> They were about 15 km from land.</div><div class='rp'>The captain told the Suskis to wait with him in the water. Help was coming. The weather was now awful, but they were wearing life jackets. After an hour, the captain and the Suskis lost each other, and there was no sign of rescue. <span class='gm'>[2]</span> They were both thinking the same terrifying thought: sharks!</div><div class='rp'>A plane and a helicopter appeared in the sky, but nobody saw Dan and Kate in the water. Hours passed and night came. The Suskis swam for fourteen hours. Then, in the moonlight, they saw some cliffs. They were only a few metres from land! <span class='gm'>[3]</span> The waves were breaking against sharp rocks; it was too dangerous. So Kate and Dan swam past the cliffs. By now, they were exhausted. Eventually, they reached a sandy beach. <span class='gm'>[4]</span></div><div class='rp'>Then they started to look for a town or village. On the way, they picked and ate green bananas. Dan said later that it was the worst – and best – food of his life! After three hours, they met a young farm worker. <span class='gm'>[5]</span> He also gave them some tragic news: the captain was lost at sea.</div><div class='rp'>Dan and Kate Suski spent a few days in hospital. Their story appeared in news programmes around the world. And there was one final piece of astonishing news: the captain also survived. A rescue boat found him after 23 hours in the water!</div>",
"exercises":[
{"type":"gap-match","title":"Exercise 1","instr":"Match sentences A–G with gaps 1–5 in the text. There are two extra sentences.","opts":[
{"l":"A","t":"So Dan and Kate started to swim as fast as they could towards land."},
{"l":"B","t":"The captain helped them as they climbed onto dry land."},
{"l":"C","t":"He gave them water and food, and stayed with them until the police arrived."},
{"l":"D","t":"So they did, and a few minutes later, the boat disappeared under the waves."},
{"l":"E","t":"Out of the water at last, they lay down and rested."},
{"l":"F","t":"But the sharks swam away after a few minutes."},
{"l":"G","t":"But they couldn't get out of the water here."}
],"numGaps":5,"answers":{"1":"D","2":"A","3":"G","4":"E","5":"C"},"extra":"BF",
"expls":{
"1":{"loc":"Para 2 – after the captain shouts 'Jump out!'","quote":"Then he shouted to the Suskis, 'Jump out! Jump out!' [1] They were about 15 km from land.","para":"D ('So they did, and a few minutes later, the boat disappeared under the waves') directly continues the captain's command. 'So they did' = they jumped. The boat then sinking explains WHY jumping was urgent.","tip":"'So they did' = they followed the command to jump. Look for 'so' to link a command with its execution."},
"2":{"loc":"Para 3 – after 'no sign of rescue'","quote":"After an hour, the captain and the Suskis lost each other, and there was no sign of rescue. [2] They were both thinking the same terrifying thought: sharks!","para":"A ('So Dan and Kate started to swim as fast as they could towards land') explains the action the siblings took after realising no rescue was coming. Swimming quickly then logically leads to fear of sharks.","tip":"No rescue → make a decision. A explains their response (swim). The 'terrifying thought' of sharks follows naturally from swimming alone."},
"3":{"loc":"Para 4 – after 'only a few metres from land'","quote":"They were only a few metres from land! [3] The waves were breaking against sharp rocks; it was too dangerous.","para":"G ('But they couldn't get out of the water here') introduces the problem of being close but unable to exit. The following sentence explains WHY (sharp rocks, waves).","tip":"'But' signals a problem after good news (land visible). G introduces the obstacle, the next sentence gives the reason (rocks)."},
"4":{"loc":"Para 4 – after 'they reached a sandy beach'","quote":"Eventually, they reached a sandy beach. [4]","para":"E ('Out of the water at last, they lay down and rested') is the natural reaction after 14 hours of swimming. A safe beach = finally being able to rest.","tip":"After extreme physical effort (14 hours swimming), resting is the obvious first action on reaching a safe beach."},
"5":{"loc":"Para 5 – after 'met a young farm worker'","quote":"After three hours, they met a young farm worker. [5] He also gave them some tragic news.","para":"C ('He gave them water and food, and stayed with them until the police arrived') describes the farm worker's help. 'He also gave them tragic news' links perfectly to C's 'He' – the same person.","tip":"'He' in [5] and in the next sentence both refer to the farm worker. C explains his helpful actions first, then the text adds the tragic news."},
"extra":{"loc":"B and F are the extra sentences","quote":"","para":"B says the captain helped them – but the captain was LOST at sea (the text says so). F says sharks swam away – but the text says they were thinking ABOUT sharks, not that sharks actually appeared.","tip":"B contradicts the text (captain was lost). F adds detail about sharks that the text never confirms happened."}}},
{"type":"true-false","title":"Exercise 2","instr":"Read the text again. Are these sentences True (T) or False (F)?","statements":[
{"text":"When Dan and Kate were fishing, the weather was brilliant.","answer":"F","expl":{"loc":"Para 2, sentence 2","quote":"The weather wasn't brilliant, but Dan wasn't complaining.","para":"FALSE: The text explicitly says 'the weather wasn't brilliant'. Brilliant = very good, so this is false.","tip":"Near-direct quote: 'weather wasn't brilliant' directly contradicts 'weather was brilliant'."}},
{"text":"Dan was the first person to see that there was a problem with the boat.","answer":"F","expl":{"loc":"Para 2, sentences 4–5","quote":"the captain realised there was a problem. Water was coming into the cabin and the boat was sinking fast.","para":"FALSE: The captain realised first, not Dan. Dan was busy pulling a fish.","tip":"'The captain realised' → it was the captain, not Dan. Read who realised first."}},
{"text":"The boat sank before Dan and Kate could jump into the water.","answer":"F","expl":{"loc":"Paras 2 and gap 1","quote":"'Jump out! Jump out!' [1] So they did, and a few minutes later, the boat disappeared under the waves.","para":"FALSE: They jumped FIRST ('so they did'), and then the boat sank ('a few minutes later'). Order matters.","tip":"Timeline: jump → then boat sinks. 'A few minutes later' after they jumped confirms the order."}},
{"text":"A helicopter saw Dan and Kate in the sea, but it couldn't rescue them.","answer":"F","expl":{"loc":"Para 4, sentence 1","quote":"A plane and a helicopter appeared in the sky, but nobody saw Dan and Kate in the water.","para":"FALSE: The statement says the helicopter SAW them. The text says 'nobody saw' them. They were invisible to rescuers.","tip":"Key difference: 'saw but couldn't rescue' (false) vs 'nobody saw them' (true). The helicopter didn't see them."}},
{"text":"When Dan and Kate reached land, they couldn't get out of the water at first.","answer":"T","expl":{"loc":"Para 4 – cliffs section","quote":"But they couldn't get out of the water here. The waves were breaking against sharp rocks; it was too dangerous.","para":"TRUE: Sentence G (in gap 3) confirms they couldn't exit at the cliffs. They had to swim further to find a beach.","tip":"G = 'couldn't get out of the water here' → True. They first reached dangerous cliffs, then swam to a beach."}},
{"text":"There was nobody on the beach when Dan and Kate got out of the sea.","answer":"T","expl":{"loc":"Para 5, first sentence","quote":"Then they started to look for a town or village.","para":"TRUE: They had to SEARCH for people ('look for a town or village'), implying the beach was empty when they arrived.","tip":"If someone was there to help, they wouldn't need to 'look for a town'. The act of searching implies they were alone."}},
{"text":"The captain swam to the beach a few hours after Dan and Kate.","answer":"F","expl":{"loc":"Para 6, last sentence","quote":"the captain also survived. A rescue boat found him after 23 hours in the water.","para":"FALSE: The captain didn't swim to the beach – a RESCUE BOAT found him 23 hours later. He didn't make it to land on his own.","tip":"'A rescue boat found him' – he was rescued at sea, not on the beach. 23 hours ≠ 'a few hours'."}}
]}
]},

{"id":3,"title":"Video Games & Health","topic":"On Screen – Video Games","emoji":"🎮",
"textHTML":"<div class='ptitle'>📖 Why Video Games Are Good for Your Health</div><div class='rp'>Many people assume that video games have a negative effect on young people. A lot of time in front of a screen is bad for the mind and the body, they believe. Newspaper headlines often express the same opinion – and combat games cause the most concern because of the violence.</div><div class='rp'>But is there any evidence for this view? According to a report in <i>American Psychologist</i>, the truth is not so simple. Playing video games is sometimes good for children's education, health and social skills.</div><div class='rp'>Research shows that video games can actually improve certain mental skills. This is especially true for combat games. These games teach players to think about objects in three dimensions and this makes them better at studying science, technology, engineering and maths. Other types of video game do not usually provide these benefits.</div><div class='rp'>However, other types of video game can have other positive effects. In 2013, scientists did some research into the effect of role-playing games (RPGs) on children. The research showed that when children spend a lot of time playing RPGs, they get better grades at school than children who do not play them.</div><div class='rp'>Other research showed that playing any kind of video game, including violent games, improves children's creativity. But using a computer or smartphone for emails or other tasks does not provide this benefit.</div><div class='rp'>Quick and simple games like Angry Birds can improve players' mood and prevent them from feeling anxious. This emotional benefit is important, the report suggests. Feeling relaxed and happy is good for your health.</div><div class='rp'>The report also describes another emotional benefit of video games: they teach children how to react well to failure. In video games, players continually fail and try again. This makes them emotionally strong in real life.</div><div class='rp'>Video games can improve social skills too, the report says. More than 70% of gamers play with a friend, not alone, and millions of people take part in huge online games like Minecraft and Farmville. The players learn useful social skills: how to lead a group, how to work together and how to make decisions.</div><div class='rp'>Overall, the report does not deny that some video games can have negative effects; but it is important to think about the benefits too. And remember: you mustn't believe everything you read in the newspapers!</div>",
"exercises":[
{"type":"mcq-list","title":"Exercise 1","instr":"Choose the correct answers (a–d).","questions":[
{"text":"Newspaper headlines about video games…","opts":[{"l":"a","t":"only talk about violent games."},{"l":"b","t":"always present the same view."},{"l":"c","t":"do not tell the truth."},{"l":"d","t":"usually present a negative view."}],"answer":"d","expl":{"loc":"Para 1","quote":"Newspaper headlines often express the same opinion – and combat games cause the most concern.","para":"D is correct: headlines 'often' (= usually) express negative opinions. A is wrong – it says 'only violent', but headlines discuss games generally. B says 'always' – too strong (text says 'often'). C says they lie – not stated.","tip":"'Often' in the text = 'usually' in option d. Watch out for 'only' (a) and 'always' (b) – these absolute words are usually wrong."}},
{"text":"You learn to think about things in three dimensions when you…","opts":[{"l":"a","t":"play combat games."},{"l":"b","t":"play any kind of video game."},{"l":"c","t":"study engineering or maths."},{"l":"d","t":"do scientific studies."}],"answer":"a","expl":{"loc":"Para 3","quote":"This is especially true for combat games. These games teach players to think about objects in three dimensions.","para":"A is correct. Para 3 specifically says this is 'especially true for combat games' and then says 'other types of video game do NOT usually provide these benefits'.","tip":"'Especially true for combat games' narrows the answer to a. Para 3 also explicitly says OTHER game types don't provide this – eliminating b."}},
{"text":"Research shows that role-playing games…","opts":[{"l":"a","t":"are the only games that make children more creative."},{"l":"b","t":"do not provide as many benefits as violent games."},{"l":"c","t":"help children to do well at school."},{"l":"d","t":"help children learn to fail successfully."}],"answer":"c","expl":{"loc":"Para 4","quote":"when children spend a lot of time playing RPGs, they get better grades at school than children who do not play them.","para":"C is correct: 'better grades at school' = 'do well at school'. A is wrong – ALL games improve creativity (Para 5). B is not mentioned. D refers to all games failing and trying again, not specifically RPGs.","tip":"'Better grades at school' (text) = 'do well at school' (option c). Match the paraphrase."}},
{"text":"The report also suggests that video gamers…","opts":[{"l":"a","t":"spend a lot of time on their own."},{"l":"b","t":"learn some useful skills by playing with others."},{"l":"c","t":"usually fail in other areas of their lives."},{"l":"d","t":"spend a lot of time on smartphones."}],"answer":"b","expl":{"loc":"Para 8","quote":"The players learn useful social skills: how to lead a group, how to work together and how to make decisions.","para":"B is correct: 'useful social skills by playing with others' = playing together in online games. A is wrong – text says 70% play WITH a friend. C is wrong – failing in games makes them strong (not failing in life). D is wrong – smartphones ≠ video games.","tip":"'Useful social skills' (text) = 'useful skills by playing with others' (option b). The 70% statistic confirms they play with others."}},
{"text":"According to the report, the effect of video games on children…","opts":[{"l":"a","t":"is mostly good."},{"l":"b","t":"is mostly bad."},{"l":"c","t":"is not known."},{"l":"d","t":"is not very important."}],"answer":"a","expl":{"loc":"Para 9 (conclusion)","quote":"the report does not deny that some video games can have negative effects; but it is important to think about the benefits too.","para":"A is correct. The article's title says 'good for your health', lists many benefits, and the conclusion acknowledges some negatives BUT emphasises benefits. 'Mostly good' captures this balanced-but-positive tone.","tip":"The overall tone is positive (lists benefits in paras 3–8) with just a small admission of negatives in the conclusion. Mostly good = correct."}}
]},
{"type":"short-answer","title":"Exercise 2","instr":"Answer the questions using information from the text.","questions":[
{"text":"What do many people assume about the effects of video games on young people?","answer":"Many people assume that video games have a negative effect on young people.","kw":["negative","assume","effect"],"expl":{"loc":"Para 1, sentence 1","quote":"Many people assume that video games have a negative effect on young people.","para":"Near-direct quote from the first sentence. The key word is 'assume' (= believe without proof) and 'negative effect'.","tip":"The question uses 'assume' and so does the text. Identify the subject (many people) + verb (assume) + object (negative effect)."}},
{"text":"What kinds of skills can combat games improve?","answer":"Mental skills / thinking about objects in three dimensions / spatial skills.","kw":["mental","dimension","spatial","three"],"expl":{"loc":"Para 3","quote":"video games can actually improve certain mental skills. This is especially true for combat games. These games teach players to think about objects in three dimensions.","para":"Two key answers: 'mental skills' (general) and 'thinking in three dimensions' (specific). Both are acceptable.","tip":"Para 3 gives two answers: mental skills AND 3D thinking. Give at least one for full credit."}},
{"text":"What can simple games like Angry Birds prevent?","answer":"They can prevent players from feeling anxious.","kw":["anxious","anxiety","prevent","mood"],"expl":{"loc":"Para 6","quote":"Quick and simple games like Angry Birds can improve players' mood and prevent them from feeling anxious.","para":"The answer is 'prevent them from feeling anxious'. This is a direct quote from the text.","tip":"'Prevent + from + -ing' is the structure. Angry Birds example → prevent feeling anxious."}},
{"text":"What kind of game helps children to get better grades at school, according to a 2013 report?","answer":"Role-playing games (RPGs).","kw":["role","rpg","playing"],"expl":{"loc":"Para 4","quote":"scientists did some research into the effect of role-playing games (RPGs) on children. The research showed that when children spend a lot of time playing RPGs, they get better grades at school.","para":"The answer is RPGs (role-playing games). The year 2013 in the question is a search anchor – find '2013' in the text, then read around it.","tip":"Year anchors: scan for '2013' in the text. The game type mentioned in the same sentence is the answer."}},
{"text":"What kind of game teaches children how to work together?","answer":"Online games (e.g. Minecraft, Farmville).","kw":["online","minecraft","farmville","social"],"expl":{"loc":"Para 8","quote":"millions of people take part in huge online games like Minecraft and Farmville. The players learn useful social skills: how to lead a group, how to work together and how to make decisions.","para":"Online games (specifically Minecraft/Farmville) teach social skills including 'how to work together'.","tip":"'Work together' appears directly in the text. Find it and read back to identify the game type (online games)."}}
]}
]},

{"id":4,"title":"Gliders in the Storm","topic":"Our Planet – Extreme Weather","emoji":"🪂",
"textHTML":"<div class='ptitle'>📖 Gliders in the Storm – A Bumpy Ride</div><div class='rp'>In February 2007, about two hundred paragliders were in Australia for a few days to prepare for the World Championship. They included Ewa Wiśnierska, a German paragliding champion. One morning, as the competitors <span class='gm'>[1]</span>, they noticed that a thunderstorm was approaching. However, they decided to carry on. After all, these were the best paragliders in the world; they were certainly skilful enough <span class='gm'>[2]</span>. Or so they thought.</div><div class='rp'>Unfortunately, as the competitors took off, the weather <span class='gm'>[3]</span> quickly. That was the start of the most terrifying and dangerous experience of her life. Ewa tried to get away from the storm, but two enormous clouds <span class='gm'>[4]</span>. The clouds pulled Ewa up inside the storm like a leaf in the wind. She <span class='gm'>[5]</span> with lightning and hail all around her. 'I was shaking,' she told reporters afterwards. 'The last thing I remember, it was dark. I could hear lightning all around me.'</div><div class='rp'>She rose to an altitude of nearly 10,000 m – that's higher than the top of Mount Everest – and then <span class='gm'>[6]</span>. At that height, the temperature was about –40°C and there was very little oxygen. Death <span class='gm'>[7]</span>.</div><div class='rp'>For forty minutes, Ewa was unconscious. When she woke up, she was still inside the storm. It was dark and hailstones were flying past. They were as big as tennis balls. But fortunately her glider, <span class='gm'>[8]</span>, was still in one piece.</div><div class='rp'>Eventually, Ewa came out of the storm cloud and saw a small farm on the ground. She headed towards it and landed safely. She fell to the ground and rolled over, too weak and confused to call for help. When her team reached her, she was 60 km away from the place <span class='gm'>[9]</span>. She was covered in ice – but alive!</div><div class='rp'>Godfrey Wenness, the organiser of the championships, described Ewa as the luckiest woman in the world. 'This is like winning the lottery ten times in a row. That's how lucky this woman is. There's no logical reason why <span class='gm'>[10]</span>,' he said. Sadly, a Chinese competitor was not as lucky as Ewa. He flew into the same storm and died. Ewa had frostbite on her ears and legs and went to hospital for treatment, but a few days later, she competed in the World Championship. 'Flying is too fantastic to stop because of an accident,' she said.</div>",
"exercises":[
{"type":"gap-match","title":"Exercise – Gap Fill","instr":"Match phrases A–K with gaps 1–10. There is one extra phrase you will not need.","opts":[
{"l":"A","t":"flew higher and higher"},
{"l":"B","t":"to keep away from some dark clouds"},
{"l":"C","t":"which was spinning above her head"},
{"l":"D","t":"seemed certain"},
{"l":"E","t":"came together and trapped her"},
{"l":"F","t":"where she took off"},
{"l":"G","t":"to spend more time on the ground"},
{"l":"H","t":"were getting ready to take off"},
{"l":"I","t":"she got away with it"},
{"l":"J","t":"lost consciousness"},
{"l":"K","t":"became worse"}
],"numGaps":10,"answers":{"1":"H","2":"B","3":"K","4":"E","5":"A","6":"J","7":"D","8":"C","9":"F","10":"I"},"extra":"G",
"expls":{
"1":{"loc":"Para 1 – 'as the competitors [1]'","quote":"One morning, as the competitors [1], they noticed that a thunderstorm was approaching.","para":"H ('were getting ready to take off') fits the past continuous structure 'as the competitors ___'. They hadn't taken off yet – they noticed the storm while PREPARING to fly.","tip":"Grammar clue: 'as the competitors ___' needs a past continuous verb phrase. H ('were getting ready') fits perfectly."},
"2":{"loc":"Para 1 – 'skilful enough [2]'","quote":"they were certainly skilful enough [2]. Or so they thought.","para":"B ('to keep away from some dark clouds') completes 'skilful enough TO ___'. They thought they could avoid the clouds. 'Or so they thought' = they were wrong.","tip":"'Skilful enough + infinitive' → find a phrase starting with 'to'. B = 'to keep away from...'"},
"3":{"loc":"Para 2 – 'the weather [3] quickly'","quote":"as the competitors took off, the weather [3] quickly.","para":"K ('became worse') fits: the weather deteriorated rapidly after takeoff. 'Quickly' shows sudden change.","tip":"'The weather [3] quickly' needs a verb. K = 'became worse' is a simple past verb phrase describing rapid deterioration."},
"4":{"loc":"Para 2 – 'two enormous clouds [4]'","quote":"Ewa tried to get away from the storm, but two enormous clouds [4].","para":"E ('came together and trapped her') describes the clouds surrounding Ewa. The 'but' signals a bad outcome despite her efforts.","tip":"'But' + subject (clouds) + [4] → the clouds did something bad to Ewa. E describes them closing in and trapping her."},
"5":{"loc":"Para 2 – 'She [5] with lightning and hail'","quote":"The clouds pulled Ewa up inside the storm like a leaf in the wind. She [5] with lightning and hail all around her.","para":"A ('flew higher and higher') describes Ewa's ascent inside the storm. The previous sentence says 'clouds pulled Ewa up', so 'flew higher' is the natural continuation.","tip":"'Pulled up' → 'flew higher and higher'. The upward motion is the key connection between sentences."},
"6":{"loc":"Para 3 – 'rose to 10,000m and then [6]'","quote":"She rose to an altitude of nearly 10,000 m – that's higher than the top of Mount Everest – and then [6].","para":"J ('lost consciousness') explains what happened at 10,000m with –40°C and no oxygen – she passed out. Her quote in para 2 ('The last thing I remember...') confirms she lost consciousness.","tip":"'The last thing I remember' in para 2 confirms she became unconscious. At –40°C with no oxygen = lose consciousness."},
"7":{"loc":"Para 3 – 'Death [7]'","quote":"At that height, the temperature was about –40°C and there was very little oxygen. Death [7].","para":"D ('seemed certain') completes 'Death seemed certain' – she was expected to die at 10,000m with those conditions.","tip":"Short sentence: 'Death [7]'. Subject = Death, [7] = predicate. D = 'seemed certain' makes a complete simple sentence."},
"8":{"loc":"Para 4 – 'her glider, [8], was still in one piece'","quote":"But fortunately her glider, [8], was still in one piece.","para":"C ('which was spinning above her head') is a relative clause (which + verb) providing extra info about the glider. Commas signal a non-defining relative clause.","tip":"Two commas around the gap = relative clause. C starts with 'which' = relative pronoun. 'Spinning above her head' shows the glider was still flying."},
"9":{"loc":"Para 5 – '60 km away from the place [9]'","quote":"she was 60 km away from the place [9]. She was covered in ice – but alive!","para":"F ('where she took off') completes 'the place WHERE she took off'. A relative clause of place starting with 'where'.","tip":"'The place [9]' = 'the place WHERE ___'. F = 'where she took off' completes this relative clause perfectly."},
"10":{"loc":"Para 6 – 'no logical reason why [10]'","quote":"There's no logical reason why [10],' he said.","para":"I ('she got away with it') = she survived against all odds. 'Got away with it' means surviving something that should have been fatal.","tip":"'No logical reason why [10]' needs a subject (she) + got away. I = 'she got away with it' = survived impossibly."},
"extra":{"loc":"G is the extra phrase","quote":"","para":"G ('to spend more time on the ground') doesn't fit anywhere. The text is about people WANTING to fly, not wanting to stay on the ground. The context never calls for this idea.","tip":"G introduces 'wanting to stay on the ground' – no gap in the text expresses this idea. Paragliders chose to fly despite the storm."}}}
]},

{"id":5,"title":"Best Jobs in the World","topic":"Ambition – Dream Careers","emoji":"💼",
"textHTML":"<div class='ptitle'>📖 The Best Jobs in the World … Probably</div><div class='rp'><b>A</b> – Back in 2012, Andrew Johnson was near the end of his History & Photography degree in Chicago. He planned to apply to film school after graduation, rather than look for a job. But then his dad noticed an advertisement for a job with toy manufacturer Lego. Andrew, who was already a Lego fan, sent in an application. It included a video of himself making models. The company loved it and invited him to take part in an unusual interview. He had to compete against seven other finalists in a model-building test. Andrew won, and as a result, they offered him a job: he joined the team at Legoland Discovery Centre in Illinois as a Master Model Builder. He meets visitors and helps to give them exciting new ideas. Perhaps one day he'll go to film school, but for now, he's happy. 'Lego was always just a hobby, but now I can do what I love and get paid for it,' said Andrew in an interview.</div><div class='rp'><b>B</b> – Do you find it difficult to get out of bed sometimes, especially on frosty winter mornings? Well, imagine having a job where you don't have to. Jo Unsworth works as a duvet tester for John Lewis, a British department store. She has the job of finding the most comfortable duvets in the world to sell in their shops. Jo has a degree in textiles, so she can recognise good quality. But the real test of a duvet is sleeping under it. 'It's probably the only career where it's OK to fall asleep while you're at work,' Jo says. She often can't believe how lucky she is to have her 'dream job!' What is more, she finds it rewarding: 'If I do my job properly, hundreds of other people sleep better. It's brilliant!'</div><div class='rp'><b>C</b> – Some film providers like Netflix employ people to watch new films and TV series from the comfort of their own home! Their job is to make a note of what type of film it is (horror, rom-com, etc.) and what age group and type of person might like it. The film provider can then recommend it to their members. Joe Mason finished his degree in film studies about two years ago and didn't know what to do next. Then he read an article about film taggers. 'It sounded like a fantastic job so I did some research online and wrote to Netflix,' said Joe. At first they weren't interested, but when Joe told them he speaks fluent French – his mum is French – they gave him a job. He watches French films and TV programmes. 'It's a great job because I can work when I want. I can take a day off if I like and work at the weekend instead.' The only problem with the job is that Joe can't choose what he wants to watch. 'Sometimes I have to watch 15 episodes of rubbish! But I shouldn't complain really.'</div>",
"exercises":[
{"type":"short-answer","title":"Exercise – Sentence Completion","instr":"Complete the sentences with information from the texts. Write 1–2 words only.","questions":[
{"text":"The Lego company was very keen on the _________ that Andrew sent with his job application. (1 word)","answer":"video","kw":["video"],"expl":{"loc":"Para A","quote":"It included a video of himself making models. The company loved it.","para":"The company 'loved' the video – 'loved it' = 'very keen on'. The video was the standout part of his application.","tip":"'Very keen on' = 'loved'. Find what the company reacted positively to → the video."}},
{"text":"Andrew is happy to earn money for something that used to be a _________. (1 word)","answer":"hobby","kw":["hobby"],"expl":{"loc":"Para A, last quote","quote":"'Lego was always just a hobby, but now I can do what I love and get paid for it.'","para":"Andrew's direct quote: Lego was 'just a hobby' → now he earns money from it.","tip":"Direct quote answer: 'Lego was always just a hobby' → hobby fills the blank."}},
{"text":"Jo Unsworth has a job at a famous British _________ _________. (2 words)","answer":"department store","kw":["department","store"],"expl":{"loc":"Para B","quote":"Jo Unsworth works as a duvet tester for John Lewis, a British department store.","para":"John Lewis is described as 'a British department store'. The 2 words are 'department store'.","tip":"Look for 'British' + a business type near Jo's name → 'department store'."}},
{"text":"Jo's university qualification helps her to identify _________ _________ when she sees it. (2 words)","answer":"good quality","kw":["quality","good"],"expl":{"loc":"Para B","quote":"Jo has a degree in textiles, so she can recognise good quality.","para":"Her degree → ability to 'recognise good quality'. The 2 words are 'good quality'.","tip":"'University qualification' = 'degree'. What does the degree help her recognise? → 'good quality'."}},
{"text":"An advantage of Joe's job is that he can _________ when he wants. (1 word)","answer":"work","kw":["work"],"expl":{"loc":"Para C","quote":"'It's a great job because I can work when I want.'","para":"Joe's direct quote: 'work when I want'. The advantage is flexibility of working hours.","tip":"Direct quote: 'I can work when I want' → work fills the blank."}},
{"text":"A disadvantage of Joe's job is that he can't _________ what programmes to watch. (1 word)","answer":"choose","kw":["choose"],"expl":{"loc":"Para C, last sentences","quote":"The only problem with the job is that Joe can't choose what he wants to watch.","para":"'The only problem' = disadvantage. 'Can't choose' fills the blank.","tip":"'Disadvantage' = 'the only problem'. The problem: can't choose what to watch."}}
]}
]},

{"id":6,"title":"Free at Last?","topic":"Tourism – Holidays Without Parents","emoji":"🏕️",
"textHTML":"<div class='ptitle'>📖 Free at Last?</div><div class='rp'><i>Have you ever seen travel programmes on TV about teenagers on holiday without parents? They're always having a wild and exciting time. But is it really like that? We asked three writers to tell us their personal experiences…</i></div><div class='rp'><b>A – Hilary Bradt</b> (co-founder of a travel guide company)<br>When I was fifteen, I went to stay with my penfriend in north Germany. It was my first trip abroad and the first without my parents, and I hated every minute of it. The worst moment was probably the time when I was alone in the house and somebody rang the doorbell. They rang it again and again – but I ignored it. Then I saw the visitor walking around the house looking through the windows. Frightened, I hid under the dining-room table. That afternoon, Christina's mother came home from work and said, 'I needed to pick up some papers from the house today and I didn't have my key. I rang the bell. But you didn't hear me.' 'Oh, I was in my room, I expect,' I said. 'Sorry!' My face went red, because she knew I was lying. I'm certain she saw me under the table.</div><div class='rp'><b>B – Kevin Rushby</b> (writer)<br>At sixteen, I hitch-hiked down to Cornwall in the south-west of England with a friend. We spent the holiday walking along the coastal path with a tent and a backpack, staying at campsites on the way. The weather was fantastic and the sea was beautiful. We had almost no money and lived on sandwiches and tea. One of the first things I learned was this: a fire and a mug of tea can make the world seem perfect. The second thing: spending more money does not mean having more fun. What really mattered was talking to people. I had to do lots of chatting, negotiating, discussing and questioning. Strangers could be very helpful and interesting, I discovered. They could also be dangerous, boring and stupid. It was up to me to judge them and decide – and that skill has been useful to me many times since then. I wrote it all down, but I've lost the notebook now, unfortunately.</div><div class='rp'><b>C – Terry Alderton</b> (comedian)<br>My friends and I were nineteen and on holiday in the coolest place in the world: Ibiza. On the first day, I fell asleep on the beach – with no suncream. My friends knew I was getting sunburned, but they didn't wake me up because they thought it was funny. When I woke up, I felt a little sore. Then I took off my sunglasses and my friends all fell on the floor, laughing. I had two clear white rings around my eyes! That night, we all went out dancing and of course I had to keep wearing the same sunglasses because of my sunburn. I wasn't enjoying myself, so I left before my friends. For some reason, I didn't want to wait for a bus back to our hotel, so I walked seven kilometres along busy roads. When I finally arrived, my friends were already there, sitting around the pool. I've never understood how they got there so quickly.</div>",
"exercises":[
{"type":"mcq-list","title":"Exercise – Multiple Choice","instr":"Circle the correct answers (a–d).","questions":[
{"text":"Hilary went red because her penfriend's mother knew…","opts":[{"l":"a","t":"that Hilary didn't hear the doorbell."},{"l":"b","t":"that Hilary was in her bedroom."},{"l":"c","t":"that Hilary was not telling the truth."},{"l":"d","t":"why Hilary did not want to open the door."}],"answer":"c","expl":{"loc":"Para A, last sentences","quote":"My face went red, because she knew I was lying. I'm certain she saw me under the table.","para":"C is correct: Hilary lied ('I was in my room') and her face went red because the mother KNEW she was lying (she saw Hilary under the table). A is wrong – the mother heard the bell ringing (she rang it herself). B is what Hilary claimed, not the truth.","tip":"'She knew I was lying' = 'knew Hilary was not telling the truth'. Near-direct quote match."}},
{"text":"On Kevin's first holiday without his parents, he…","opts":[{"l":"a","t":"walked all the way to the south-west of England."},{"l":"b","t":"decided to hitch-hike around south-west England."},{"l":"c","t":"spent the holiday at a campsite in Cornwall."},{"l":"d","t":"camped at various places along the coast."}],"answer":"d","expl":{"loc":"Para B, sentences 2–3","quote":"We spent the holiday walking along the coastal path with a tent and a backpack, staying at campsites on the way.","para":"D is correct: 'camped at various places along the coast' = 'walking along the coastal path staying at campsites on the way'. A is wrong – he hitch-hiked (not walked all the way). C says ONE campsite but text says multiple ('campsites on the way').","tip":"'Various places' = 'campsites on the way' (multiple sites along the path). C says one campsite – wrong."}},
{"text":"Meeting lots of different people taught Kevin…","opts":[{"l":"a","t":"some useful skills that he later lost."},{"l":"b","t":"that negotiating with strangers can be dangerous."},{"l":"c","t":"how to decide what strangers are like."},{"l":"d","t":"that talking to strangers is usually boring."}],"answer":"c","expl":{"loc":"Para B","quote":"It was up to me to judge them and decide – and that skill has been useful to me many times since then.","para":"C is correct: 'how to decide what strangers are like' = 'to judge them and decide'. A is wrong – the skill was useful (not lost; he lost his NOTEBOOK, not the skill). B and D are too negative – text says strangers can be helpful AND dangerous.","tip":"'Judge them and decide' (text) = 'decide what strangers are like' (option c). Note: he lost his notebook, not the skill."}},
{"text":"Terry had circles around his eyes because…","opts":[{"l":"a","t":"his friends put lots of suncream on his face."},{"l":"b","t":"the rest of his face was red from the sun."},{"l":"c","t":"his eyes were sore from too much sun."},{"l":"d","t":"he wanted to make his friends laugh."}],"answer":"b","expl":{"loc":"Para C","quote":"I fell asleep on the beach – with no suncream... I had two clear white rings around my eyes!","para":"B is correct: he wore sunglasses while sleeping. The sunglasses BLOCKED the sun from the eye area, so those areas stayed white/pale while the rest of his face burned red. The white rings = areas protected by sunglasses.","tip":"Logic: sunglasses block sun → protected skin stays WHITE; exposed skin = RED. White rings = protected areas around eyes."}},
{"text":"Terry decided to walk back to the hotel because…","opts":[{"l":"a","t":"he wanted to get back to the hotel before his friends."},{"l":"b","t":"he knew there were no more buses."},{"l":"c","t":"he didn't feel like standing at the bus stop."},{"l":"d","t":"he knew it was not very far."}],"answer":"c","expl":{"loc":"Para C","quote":"For some reason, I didn't want to wait for a bus back to our hotel, so I walked seven kilometres along busy roads.","para":"C is correct: 'didn't want to WAIT for a bus' = 'didn't feel like STANDING at the bus stop'. A is wrong – his friends arrived before him, so he didn't get there first. B is wrong – the text says he didn't WANT to wait, not that there were no buses. D is wrong – 7 km is quite far.","tip":"'Didn't want to wait for a bus' (text) = 'didn't feel like standing at the bus stop' (option c). The reason is personal preference, not bus availability."}}
]}
]},

{"id":7,"title":"Aaron Levie – Box Clever","topic":"Money – Young Entrepreneurs","emoji":"💰",
"textHTML":"<div class='ptitle'>📖 Aaron Levie – Box Clever</div><div class='rp'>Aaron Levie loves to eat tinned spaghetti, drives a six-year-old car, and has business meetings at a takeaway. He lives in an ordinary apartment, doesn't take holidays and, at the age of 27, says his biggest luxury is his smartphone. <span class='gm'>[1]</span> However, as co-founder and CEO of Box, a successful IT company, he is worth about $100 million. And he works very hard for his money: most days, he does not leave the office until after midnight. 'I work so many hours because I love what I do. I'm incredibly excited about the business,' says Levie.</div><div class='rp'>When Levie and his childhood friend Dylan Smith started their company in 2005, they had not even finished their university degrees. Box grew fast because it offered a better way of storing data, and soon they had contracts with many of the biggest companies in the USA. Levie left university without finishing his course.</div><div class='rp'>Like most new businesses, Box did not bring in much income at the start. Levie paid himself a salary of only $500 a month, and lived off tinned spaghetti and instant noodles. <span class='gm'>[2]</span> Sometimes he even slept there too.</div><div class='rp'>When Box began, Levie and Smith looked for funding. <span class='gm'>[3]</span> For that reason, nobody wanted to risk lending them money. They wrote letter after letter but could not find any investors. Eventually, a well-known entrepreneur called Mark Cuban agreed to put money into Box. Once he had decided to do that, others followed and the business grew quickly. That was eight years ago.</div><div class='rp'>Now, Box has grown a lot and so have its profits, making Levie a multi-millionaire. <span class='gm'>[4]</span> But Levie says that it doesn't interest him. 'I'm certainly not into money. I don't live in the office – now I have an apartment six minutes' drive away – but there is no enormous house up in the hills.' <span class='gm'>[5]</span> Otherwise, he has lunch meetings in burger bars. 'And I still really like tinned spaghetti. I'd be happy if I had it every day!'</div>",
"exercises":[
{"type":"gap-match","title":"Exercise 1","instr":"Match sentences A–G with gaps 1–5. There are two extra sentences.","opts":[
{"l":"A","t":"Back in 2005, cloud storage was quite a new idea."},
{"l":"B","t":"His success in business has brought him an enormous amount of money."},
{"l":"C","t":"He only goes to expensive restaurants if an important customer wants to eat there."},
{"l":"D","t":"For two and a half years, he spent nearly all his time at his office."},
{"l":"E","t":"Most people his age would lead an extravagant lifestyle if they had so much money."},
{"l":"F","t":"If you met him, you probably wouldn't realise that he is a multi-millionaire."},
{"l":"G","t":"Cloud storage is one of the fastest-growing areas of business."}
],"numGaps":5,"answers":{"1":"F","2":"D","3":"A","4":"E","5":"C"},"extra":"BG",
"expls":{
"1":{"loc":"Para 1 – after describing his simple lifestyle","quote":"He lives in an ordinary apartment… his biggest luxury is his smartphone. [1] However, as co-founder and CEO of Box…","para":"F ('If you met him, you probably wouldn't realise that he is a multi-millionaire') contrasts his simple life with his wealth. The 'However' that follows confirms the contrast: ordinary lifestyle BUT multi-millionaire.","tip":"'However' after [1] signals a contrast. F sets up that contrast: he LOOKS ordinary → you wouldn't KNOW he's rich."},
"2":{"loc":"Para 3 – after 'lived off tinned spaghetti'","quote":"lived off tinned spaghetti and instant noodles. [2] Sometimes he even slept there too.","para":"D ('For two and a half years, he spent nearly all his time at his office') explains WHY he 'sometimes slept there'. Spending all time at the office logically leads to sleeping there occasionally.","tip":"'Slept there too' = slept at the office. D says he spent all his time at the office → 'too' confirms sleeping was additional to working there."},
"3":{"loc":"Para 4 – before 'nobody wanted to risk lending them money'","quote":"Levie and Smith looked for funding. [3] For that reason, nobody wanted to risk lending them money.","para":"A ('Back in 2005, cloud storage was quite a new idea') gives the REASON why nobody lent them money. 'For that reason' = because of [3] = because cloud storage was new and unproven.","tip":"'For that reason' = because of [3]. A provides the reason: cloud storage was too new → investors felt unsafe."},
"4":{"loc":"Para 5 – after 'making Levie a multi-millionaire'","quote":"Box has grown a lot and so have its profits, making Levie a multi-millionaire. [4] But Levie says that it doesn't interest him.","para":"E ('Most people his age would lead an extravagant lifestyle if they had so much money') sets up the contrast with Levie. 'But Levie says it doesn't interest him' – E explains what MOST people would do, making Levie's frugality more remarkable.","tip":"'But Levie says it doesn't interest him' – E explains what others would do (extravagant lifestyle), making the 'but' contrast work."},
"5":{"loc":"Para 5 – 'no enormous house… [5] Otherwise, burger bars'","quote":"there is no enormous house up in the hills.' [5] Otherwise, he has lunch meetings in burger bars.","para":"C ('He only goes to expensive restaurants if an important customer wants to eat there') is the one exception to his frugal eating. 'Otherwise' = in all other cases = burger bars. C + 'Otherwise' = the full picture of his eating habits.","tip":"'Otherwise' after [5] = 'except for [5]'. C describes the exception; 'otherwise' describes the normal (burger bars)."},
"extra":{"loc":"B and G are the extra sentences","quote":"","para":"B says 'success brought him an enormous amount of money' – this is covered in the text already ('making Levie a multi-millionaire'). G says cloud storage is 'fastest-growing' – the text says it was 'quite a new idea', not specifically fastest-growing.","tip":"Avoid choosing sentences that repeat information already in the text. B and G add no new necessary link between paragraphs."}}},
{"type":"true-false","title":"Exercise 2","instr":"Are these sentences True (T) or False (F)?","statements":[
{"text":"Aaron Levie lives in a luxury apartment.","answer":"F","expl":{"loc":"Para 1","quote":"He lives in an ordinary apartment.","para":"FALSE: The text says 'an ordinary apartment', not a luxury one. He deliberately avoids luxury.","tip":"'Ordinary' = not luxury. Direct contradiction of the statement."}},
{"text":"Levie doesn't mind working long hours because he is really enthusiastic about his work.","answer":"T","expl":{"loc":"Para 1","quote":"'I work so many hours because I love what I do. I'm incredibly excited about the business.'","para":"TRUE: 'love what I do' + 'incredibly excited' = really enthusiastic. 'Doesn't mind working long hours' = works willingly.","tip":"'Incredibly excited' = really enthusiastic. His own words confirm he enjoys the work."}},
{"text":"Levie was a student when he co-founded the company Box.","answer":"T","expl":{"loc":"Para 2","quote":"When Levie and his childhood friend Dylan Smith started their company in 2005, they had not even finished their university degrees.","para":"TRUE: 'had not even finished their university degrees' = he was still a student when Box started.","tip":"'Had not finished degrees' = still a student. He started Box BEFORE graduating."}},
{"text":"Mark Cuban was the first businessman to invest in Box.","answer":"T","expl":{"loc":"Para 4","quote":"Eventually, a well-known entrepreneur called Mark Cuban agreed to put money into Box. Once he had decided to do that, others followed.","para":"TRUE: 'Others followed' after Mark Cuban – he came first, then others invested. 'Eventually' shows he was the one who broke the deadlock.","tip":"'Others followed' = Mark Cuban went first, then others copied him. He was the first."}},
{"text":"Since he became rich and successful, Levie's lifestyle has not changed very much.","answer":"T","expl":{"loc":"Para 5","quote":"'I'm certainly not into money. I don't live in the office – now I have an apartment six minutes' drive away – but there is no enormous house up in the hills.'","para":"TRUE: He still eats tinned spaghetti, has lunch in burger bars, and lives simply despite being worth $100 million. Very little has changed.","tip":"He still eats tinned spaghetti (mentioned twice), still avoids luxury. Simple lifestyle = unchanged since university days."}}
]}
]},

{"id":8,"title":"The Somerton Man","topic":"Crime – Unsolved Mysteries","emoji":"🔍",
"textHTML":"<div class='ptitle'>📖 Who Was the Somerton Man?</div><div class='rp'>It began at 6:30 a.m. on 1 December 1948 when some passers-by discovered the body of a man on Somerton Beach in Adelaide, Australia, just west of the city. The police arrived and launched a murder investigation. At the hospital, doctors examined the body but could not find out for sure how the man had died. In his pockets were a bus ticket from the city, a train ticket, a comb, chewing gum, cigarettes and matches. There was no wallet or identification. Nobody knew who the man was. The police continued their investigation. They could not identify the man using fingerprints or dental records.</div><div class='rp'>Then, two weeks after the discovery of the body, there was a breakthrough: they found a suitcase that the man had left at Adelaide station the day before his death. Inside the case were some clothes, a knife, scissors and a brush. However, these possessions did not reveal the man's identity. In fact, somebody had removed the labels from most of his clothes and another label from the suitcase itself.</div><div class='rp'>A new expert joined the investigation: John Cleland, a professor at the University of Adelaide. In April, he found a clue that everybody else had missed: a small piece of paper in a secret pocket inside the dead man's trousers. On the paper were two words in Persian: <i>tamám shud</i>. The words are from a famous Persian poem, and they mean 'it is the end'. Somebody had torn the paper from an old copy of a book.</div><div class='rp'>A few months later, a man gave police a copy of the book containing the poem. He said somebody had dropped it into his open-top car the day after the man on Somerton Beach died. The last page of the book – with the final two words – was missing.</div><div class='rp'>In the book, the police found two clues: a telephone number and a message. The message was in a secret code. The second line was crossed out, and some letters were unclear. The telephone number belonged to a nurse. She said she had given a copy of the book to a soldier called Alfred Boxall in 1945. Finally, the police had solved the mystery: obviously, the dead man was Alfred Boxall!</div><div class='rp'>There was only one problem: Alfred Boxall was still alive. The police found him and interviewed him. What is more, he still had his copy of the book. The mystery of the body on Somerton Beach continued. So what about the mysterious five-line message? Could that contain the answer to this puzzle? Perhaps, but unfortunately we do not know what the message says. Nobody has ever solved the secret code.</div>",
"exercises":[
{"type":"mcq-list","title":"Exercise – Multiple Choice","instr":"Circle the correct answers (a–d).","questions":[
{"text":"The suitcase did not help to identify the man because…","opts":[{"l":"a","t":"nothing in it had a name."},{"l":"b","t":"nobody was sure the suitcase belonged to him."},{"l":"c","t":"it only contained cigarettes, matches and a few other possessions."},{"l":"d","t":"they didn't find it until weeks after his death."}],"answer":"a","expl":{"loc":"Para 2","quote":"somebody had removed the labels from most of his clothes and another label from the suitcase itself.","para":"A is correct: 'nothing had a name' = labels were removed → no names. B is wrong – text says it WAS his suitcase (he left it at the station). C is wrong – the pockets had cigarettes etc., not the suitcase. D is wrong – found 2 weeks later, and 'left there the day before his death'.","tip":"'Labels removed' = nothing with his name on it = 'nothing in it had a name'. Labels = names on clothing."}},
{"text":"University professor John Cleland was the only person who…","opts":[{"l":"a","t":"understood the meaning of tamám shud."},{"l":"b","t":"found the secret pocket in the dead man's trousers."},{"l":"c","t":"had read the poem."},{"l":"d","t":"looked for clues to the dead man's identity."}],"answer":"b","expl":{"loc":"Para 3","quote":"he found a clue that everybody else had missed: a small piece of paper in a secret pocket inside the dead man's trousers.","para":"B is correct: 'everybody else had missed' = only HE found it. A is wrong – many people may know the poem's meaning. C is wrong – the poem was famous. D is wrong – the whole investigation team looked for clues.","tip":"'A clue that everybody else had missed' = he was the ONLY one who found the secret pocket. The key word is 'missed' – others looked but didn't find it."}},
{"text":"The two clues contained in the book with the missing page were…","opts":[{"l":"a","t":"a soldier's telephone number and a secret message."},{"l":"b","t":"a message in Persian and a nurse's telephone number."},{"l":"c","t":"a secret message and a nurse's telephone number."},{"l":"d","t":"two telephone numbers and the name of a nurse."}],"answer":"c","expl":{"loc":"Para 5","quote":"In the book, the police found two clues: a telephone number and a message. The message was in a secret code... The telephone number belonged to a nurse.","para":"C is correct: a secret message (in code) + a nurse's telephone number. A is wrong – it's a nurse's number, not a soldier's. B is wrong – the message was NOT in Persian (it was in code). D is wrong – only one number.","tip":"Two clues: telephone number (belongs to nurse) + message (in secret code). Match both parts of option c."}},
{"text":"After they'd interviewed the nurse, the police wrongly thought that…","opts":[{"l":"a","t":"she had given Alfred Boxall a copy of the book."},{"l":"b","t":"the dead man was Alfred Boxall."},{"l":"c","t":"she could tell them what the secret message said."},{"l":"d","t":"the dead man had given her a copy of the book."}],"answer":"b","expl":{"loc":"Para 5–6","quote":"Finally, the police had solved the mystery: obviously, the dead man was Alfred Boxall! There was only one problem: Alfred Boxall was still alive.","para":"B is correct: they WRONGLY concluded the dead man was Boxall. A is actually TRUE (the nurse DID give Boxall a book) – but the police didn't think this wrongly. C and D are not mentioned.","tip":"The word 'wrongly' = the police made a mistake. Their mistake was assuming the dead man = Alfred Boxall. But he was alive."}},
{"text":"After many investigations, we now know…","opts":[{"l":"a","t":"the identity of the dead man."},{"l":"b","t":"what the secret message in the book means."},{"l":"c","t":"how and why the man died."},{"l":"d","t":"where the piece of paper containing the words tamám shud came from."}],"answer":"d","expl":{"loc":"Para 4 + Para 6","quote":"a man gave police a copy of the book... He said somebody had dropped it into his open-top car the day after the man on Somerton Beach died.","para":"D is correct: we DO know where the paper came from (torn from a book dropped in an open-top car). A is wrong – identity still unknown. B is wrong – nobody solved the code. C is wrong – cause of death unknown.","tip":"Check what IS known vs what ISN'T: Identity=no, code=no, cause=no, but source of paper=YES (open-top car)."}}
]}
]},

{"id":9,"title":"Inventions the World Forgot","topic":"Technology – Forgotten Inventions","emoji":"⚙️",
"textHTML":"<div class='ptitle'>📖 Inventions the World Forgot</div><div class='rp'><b>1 – The Telharmonium</b><br>The Telharmonium was the world's first electronic musical instrument. It was designed by an American, Thaddeus Cahill, in 1897. Three models of the instrument were built; the first weighed about 7,000 kg, and the other two weighed nearly 200,000 kg! Music from the instrument was broadcast to people's homes using another new invention: the telephone. For the first time, people could stay at home and listen on their telephones to live music from another part of the country. (The radio had not been invented.) People loved these concerts, but there were problems. Some telephone users who were not listening to the concert were interrupted by loud music half way through their conversation! By 1914, the world was no longer interested in the Telharmonium. After Cahill's death in 1934, his brother kept one of the three models, but in 1962 it was destroyed. No recordings of the music were kept, so the Telharmonium and its unique sound have disappeared forever.</div><div class='rp'><b>2 – The Rejuvenator</b><br>In the early part of the 20th century, there was a lot of interest in the power of electricity to cure medical conditions. A device called the Rejuvenator was invented by British scientist Otto Overbeck in 1925. It was used in the home to treat all kinds of medical problems, including deafness and baldness, and became very popular. It was advertised in newspapers and members of the public were invited to watch live demonstrations in theatres. The users placed electrodes on any part of their body and a small electric current was passed through it. It was unclear exactly how the machine worked, but hundreds were sold all around the world and Overbeck became rich. In the 1950s, it was still possible to buy new parts for these machines, but today they are only seen in museums.</div><div class='rp'><b>3 – The Writing Ball</b><br>The Writing Ball was invented in 1865 by Rasmus Malling-Hansen from Denmark. It was a machine for typing onto paper. Malling-Hansen spent a long time working on the design. For example, he made sure all the keys were placed in the best positions for typing quickly. The machine even used electricity to make the movement faster. There was one problem, however: you could not see the paper as you were typing. Nevertheless, the Writing Ball was sold all over Europe and was very successful. However, each model was made by hand. Soon, other machines became more popular because they were made in factories and were cheaper. A new keyboard was developed with the keys arranged differently. This arrangement is now used on phones and computer keyboards all over the world, even though it was quicker to type using the Writing Ball. The once-popular Writing Ball was forgotten.</div><div class='rp'><b>4 – The Antikythera Mechanism</b><br>In 1901, a ship was discovered at the bottom of the sea near the Greek island of Antikythera. On the ship was an ancient machine. It had been made about 1,900 years earlier, in 2 BC. For many years after its discovery, nobody understood exactly what the machine was for. But in the 1970s, scientists used X-rays to find out its secrets. Amazingly, they found that the machine was an ancient computer. It had been designed to predict the movements of the sun, the moon and the planets. It did this using more than thirty hand-made metal wheels of different sizes. A study of the mechanism in 2006 was led by Professor Michael Edmunds from Cardiff University. He described the device as 'just extraordinary, the only thing of its kind' and 'more valuable than the Mona Lisa'. Reconstructions have been made and the device works perfectly.</div>",
"exercises":[
{"type":"short-answer","title":"Exercise 1 – Text Matching","instr":"Match questions A–F with the correct text number(s) (1, 2, 3, or 4). Some questions match more than one text – write all the numbers that apply.","questions":[
{"text":"A: Which invention(s) was/were lost and then found again?","answer":"4","kw":["4"],"expl":{"loc":"Text 4 – Antikythera Mechanism","quote":"In 1901, a ship was discovered at the bottom of the sea near the Greek island of Antikythera.","para":"Only Text 4: the Antikythera Mechanism was on a sunken ship for ~1,900 years, then found in 1901. The other inventions were forgotten/destroyed, not lost at sea and found.","tip":"'Lost and found again' = at the bottom of the sea → found by divers. Only the Antikythera Mechanism was literally found after being lost."}},
{"text":"B: Which invention(s) was/were popular for a time but then disappeared?","answer":"1, 2, 3","kw":["1","2","3"],"expl":{"loc":"Texts 1, 2, 3","quote":"By 1914, the world was no longer interested in the Telharmonium... today they are only seen in museums... The once-popular Writing Ball was forgotten.","para":"Texts 1, 2, and 3 all describe inventions that were once popular but later disappeared or were forgotten. Text 4 (Antikythera) was never popular with the public – it was ancient and unknown.","tip":"Look for 'popular then disappeared' language: 'no longer interested' (1), 'only in museums' (2), 'forgotten' (3)."}},
{"text":"C: Which invention(s) used electricity?","answer":"1, 2, 3","kw":["1","2","3"],"expl":{"loc":"Texts 1, 2, 3","quote":"1: world's first electronic instrument; 2: a small electric current; 3: used electricity to make the movement faster.","para":"All three: Telharmonium (electronic instrument), Rejuvenator (electric current), Writing Ball (used electricity). The Antikythera Mechanism was purely mechanical – no electricity.","tip":"Scan each text for 'electric' or 'electricity'. Texts 1, 2, 3 all contain electrical references. Text 4 is mechanical (metal wheels)."}},
{"text":"D: Which invention(s) was/were designed by an unknown inventor?","answer":"4","kw":["4"],"expl":{"loc":"Text 4 – Antikythera Mechanism","quote":"On the ship was an ancient machine. It had been made about 1,900 years earlier, in 2 BC.","para":"Text 4: the Antikythera Mechanism's inventor is unknown – the text gives no inventor's name. Texts 1 (Cahill), 2 (Overbeck), and 3 (Malling-Hansen) all have named inventors.","tip":"Scan each text for an inventor's name. No name for the Antikythera Mechanism → unknown inventor = Text 4."}},
{"text":"E: Which invention(s) was/were designed to improve your health?","answer":"2","kw":["2"],"expl":{"loc":"Text 2 – The Rejuvenator","quote":"It was used in the home to treat all kinds of medical problems, including deafness and baldness.","para":"Only Text 2: the Rejuvenator was specifically designed to treat medical conditions. The others were musical (1), typing (3), or astronomical (4).","tip":"'Improve health' = 'treat medical problems'. Only the Rejuvenator (Text 2) was designed for this purpose."}},
{"text":"F: Which invention(s) was/were first designed in the 19th century?","answer":"1, 3","kw":["1","3"],"expl":{"loc":"Texts 1 and 3","quote":"1: designed by Thaddeus Cahill in 1897; 3: invented in 1865 by Rasmus Malling-Hansen.","para":"Text 1 (1897) and Text 3 (1865) are both 19th century (1800s). Text 2 (Rejuvenator) was 1925 – 20th century. Text 4 (Antikythera) was 2 BC – ancient.","tip":"19th century = 1800–1899. Check dates: 1897 (✓), 1925 (✗), 1865 (✓), 2 BC (✗)."}}
]},

function fmt(s){var m=Math.floor(s/60),sec=s%60;return(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;}

function norm(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'');}

function scoreEx(ex,ea){
  var score=0,total=0,results=[];
  if(ex.type==='gap-match'){
    for(var g=1;g<=ex.numGaps;g++){
      total++;
      var ua=(ea[g]||'').toUpperCase(),ca=ex.answers[String(g)].toUpperCase(),ok=ua===ca;
      if(ok)score++;
      results.push({q:'Gap '+g,user:ua,correct:ca,ok:ok,expl:ex.expls[String(g)]});
    }
    if(ex.expls&&ex.expls.extra)results.push({q:'Extra sentence(s)',user:'',correct:ex.extra,ok:true,expl:ex.expls.extra,info:true});
  } else if(ex.type==='true-false'||ex.type==='true-false-ng'){
    ex.statements.forEach(function(st,si){
      total++;
      var ua=(ea[si]||'').toUpperCase(),ca=st.answer.toUpperCase(),ok=ua===ca;
      if(ok)score++;
      results.push({q:st.text,user:ua,correct:ca,ok:ok,expl:st.expl});
    });
  } else if(ex.type==='short-answer'){
    ex.questions.forEach(function(q,qi){
      total++;
      var ua=(ea[qi]||'').toLowerCase(),kws=q.kw||[];
      var ok=kws.some(function(k){return ua.indexOf(k.toLowerCase())>=0;});
      if(!ok&&ua.length>1)ok=norm(ua).indexOf(norm(q.answer.substring(0,6)))>=0;
      if(ok)score++;
      results.push({q:q.text,user:ea[qi]||'',correct:q.answer,ok:ok,expl:q.expl});
    });
  } else if(ex.type==='mcq-list'){
    ex.questions.forEach(function(q,qi){
      total++;
      var ua=(ea[qi]||'').toLowerCase(),ca=q.answer.toLowerCase(),ok=ua===ca;
      if(ok)score++;
      results.push({q:q.text,user:ua,correct:ca,ok:ok,expl:q.expl});
    });
  } else if(ex.type==='text-match'){
    ex.questions.forEach(function(q,qi){
      total++;
      var ua=(ea[qi]||'').toUpperCase(),ca=q.answer.toUpperCase(),ok=ua===ca;
      if(ok)score++;
      results.push({q:q.text,user:ua,correct:ca,ok:ok,expl:q.expl});
    });
  }
  return{score:score,total:total,results:results};
}

function scoreAll(userAns){
  var p=P[state.cur],totalScore=0,totalMax=0,exResults=[];
  p.exercises.forEach(function(ex,ei){var r=scoreEx(ex,userAns[ei]||{});totalScore+=r.score;totalMax+=r.total;exResults.push(r);});
  return{score:totalScore,total:totalMax,pct:totalMax>0?Math.round(totalScore/totalMax*100):0,exResults:exResults};
}
